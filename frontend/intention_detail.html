<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>意向確認詳細｜AX損害保険株式会社</title>
  <link rel="stylesheet" href="js/theme.css">
  <script src="js/session.js"></script>
  <script>applyTheme()</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--gray-bg);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: var(--text-main); font-size: 13px;
    }

    /* ═══ HEADER ═══════════════════════════════════════════════ */
    .site-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 12px var(--primary-shadow);
    }
    .header-logo { display:flex; align-items:center; gap:10px; color:#fff; text-decoration:none; }
    .header-logo svg { width:28px; height:28px; flex-shrink:0; }
    .header-logo-text .company { font-size:1rem; font-weight:700; letter-spacing:0.08em; color:var(--accent); }
    .header-right { display:flex; align-items:center; gap:10px; }
    .page-badge {
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.8);
      border-radius: 16px; padding: 4px 14px; font-size: 0.78rem; font-weight: 600;
    }
    .btn-back {
      background: var(--accent); color: var(--primary-dark); border: none;
      border-radius: 6px; padding: 6px 16px; font-size: 0.8rem; font-weight: 700;
      cursor: pointer; text-decoration: none; transition: opacity 0.2s;
    }
    .btn-back:hover { opacity: 0.85; }
    .btn-logout {
      background: transparent; border: 1.5px solid rgba(255,200,0,0.5);
      color: rgba(255,255,255,0.85); border-radius: 4px; padding: 5px 14px;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-logout:hover { background: var(--accent); color: var(--primary-dark); border-color: var(--accent); }
    .header-center-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 1.1rem; font-weight: 700; color: #fff; white-space: nowrap; pointer-events: none;
    }

    /* ═══ MAIN ══════════════════════════════════════════════════ */
    .main-content { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; }

    .card {
      background: #fff; border-radius: 10px;
      box-shadow: 0 2px 12px var(--card-shadow);
      padding: 28px 32px; margin-bottom: 20px;
    }
    .card-title {
      font-size: 0.82rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--primary); margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 2px solid var(--accent); padding-bottom: 10px;
    }

    /* ステータスバッジ */
    .status-badge {
      display: inline-block; padding: 3px 14px; border-radius: 12px;
      font-size: 0.78rem; font-weight: 700;
    }
    .badge-unrecorded { background: #fff7ed; color: #ea580c; border: 1px solid #fed7aa; }
    .badge-recorded   { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .badge-confirmed  { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }

    /* 契約情報グリッド */
    .info-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px 28px;
      margin-bottom: 4px;
    }
    .info-item { display: flex; flex-direction: column; gap: 3px; }
    .info-item label { font-size: 0.72rem; color: var(--text-sub); font-weight: 600; }
    .info-item span  { font-size: 0.88rem; color: var(--text-main); font-weight: 600; }

    /* フォーム */
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 700;
      color: var(--primary-dark); margin-bottom: 6px;
    }
    .form-group label .required {
      color: #dc2626; margin-left: 4px; font-size: 0.72rem;
    }
    .form-group textarea,
    .form-group input[type="text"],
    .form-group select {
      width: 100%; border: 1.5px solid var(--gray-border); border-radius: 6px;
      padding: 8px 12px; font-size: 0.85rem; font-family: inherit;
      color: var(--text-main); background: #fff; transition: border-color 0.2s;
    }
    .form-group textarea:focus,
    .form-group input:focus,
    .form-group select:focus {
      outline: none; border-color: var(--primary);
    }
    .form-group textarea { resize: vertical; min-height: 72px; }

    .checkbox-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
    }
    .checkbox-row input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .checkbox-row label { font-size: 0.85rem; font-weight: 600; color: var(--text-main); cursor: pointer; }

    /* 落ち理由セクション（トグル） */
    .lapse-section { border: 1px solid #fde68a; border-radius: 8px; padding: 16px; background: #fffbeb; margin-top: 8px; }
    .lapse-section .form-group:last-child { margin-bottom: 0; }

    /* 保存ボタン */
    .action-bar {
      display: flex; justify-content: flex-end; gap: 12px;
      padding-top: 16px; border-top: 1px solid var(--gray-border);
      margin-top: 24px;
    }
    .btn-cancel {
      background: #fff; border: 1.5px solid var(--gray-border);
      color: var(--text-sub); border-radius: 6px; padding: 9px 28px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-cancel:hover { background: var(--gray-card); }
    .btn-save {
      background: var(--primary); color: #fff; border: none;
      border-radius: 6px; padding: 9px 32px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .alert-success {
      background: #f0fdf4; border: 1px solid #bbf7d0; color: #15803d;
      border-radius: 8px; padding: 12px 20px; margin-bottom: 16px;
      font-size: 0.88rem; font-weight: 600; display: none;
    }
    .alert-error {
      background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
      border-radius: 8px; padding: 12px 20px; margin-bottom: 16px;
      font-size: 0.88rem; display: none;
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="dashboard.html" class="header-logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="14" fill="var(--accent)" opacity="0.18"/>
      <path d="M9 16l5 5 9-10" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="header-logo-text"><div class="company">AX損害保険株式会社</div></div>
  </a>
  <span class="header-center-title"><i class="fa-solid fa-clipboard-list" style="margin-right:6px"></i>意向確認詳細</span>
  <div class="header-right">
    <span class="page-badge">📝 意向確認</span>
    <a id="btn-back" href="maturity.html" class="btn-back">← 満期管理へ</a>
    <button class="btn-logout" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<div class="main-content">
  <div id="alert-success" class="alert-success">✅ 保存しました</div>
  <div id="alert-error"   class="alert-error"></div>

  <!-- 契約情報カード（読み取り専用） -->
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-file-contract"></i> 契約情報</div>
    <div class="info-grid">
      <div class="info-item"><label>証券番号</label><span id="info-policy-no">—</span></div>
      <div class="info-item"><label>保険種目</label><span id="info-policy-type">—</span></div>
      <div class="info-item"><label>顧客名</label><span id="info-customer-name">—</span></div>
      <div class="info-item"><label>満期日</label><span id="info-expiry-date">—</span></div>
      <div class="info-item"><label>担当者</label><span id="info-staff-code">—</span></div>
      <div class="info-item">
        <label>意向確認ステータス</label>
        <span id="info-status"><span class="status-badge badge-unrecorded">未記録</span></span>
      </div>
    </div>
  </div>

  <!-- 意向確認フォームカード -->
  <div class="card">
    <div class="card-title"><i class="fa-solid fa-pen-to-square"></i> 意向ヒアリング内容</div>

    <input type="hidden" id="intention-id">
    <input type="hidden" id="intention-contract-id">
    <input type="hidden" id="intention-agency-code">

    <div class="form-group">
      <label>顧客ニーズ・リスク認識</label>
      <textarea id="f-customer-needs" rows="3" placeholder="顧客が希望するリスク対策、ニーズをご記入ください"></textarea>
    </div>
    <div class="form-group">
      <label>提案した商品</label>
      <textarea id="f-proposed-products" rows="2" placeholder="提案した保険商品・プランを記入してください"></textarea>
    </div>
    <div class="form-group">
      <label>比較した商品</label>
      <textarea id="f-compared-products" rows="2" placeholder="比較検討した商品があれば記入してください"></textarea>
    </div>
    <div class="form-group">
      <label>推奨理由</label>
      <textarea id="f-recommendation-reason" rows="3" placeholder="最終的に推奨した理由をご記入ください"></textarea>
    </div>
    <div class="form-group">
      <label>最終選択商品</label>
      <input type="text" id="f-final-product" placeholder="顧客が最終的に選択した商品・プラン">
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="f-customer-confirmed">
      <label for="f-customer-confirmed">顧客確認済（チェックすると確認日時を自動セット）</label>
    </div>
    <div class="form-group" id="confirmed-at-row" style="display:none; margin-top:8px;">
      <label>確認日時</label>
      <input type="text" id="f-confirmed-at" readonly>
    </div>

    <div class="form-group" style="margin-top:8px;">
      <label>ステータス</label>
      <select id="f-status">
        <option value="未記録">未記録</option>
        <option value="記録済">記録済</option>
        <option value="確認済">確認済</option>
      </select>
    </div>

    <!-- 落ち理由セクション（ステータスに応じて表示） -->
    <div id="lapse-section" class="lapse-section" style="display:none">
      <div class="form-group">
        <label>落ち理由</label>
        <select id="f-lapse-reason">
          <option value="">選択してください</option>
          <option value="他社移転">他社移転</option>
          <option value="解約">解約</option>
          <option value="失効">失効</option>
          <option value="保留">保留</option>
        </select>
      </div>
      <div class="form-group">
        <label>落ち理由詳細</label>
        <textarea id="f-lapse-detail" rows="2" placeholder="落ちになった経緯・詳細を記入してください"></textarea>
      </div>
    </div>

    <div class="action-bar">
      <button class="btn-cancel" id="btn-back-action">キャンセル</button>
      <button class="btn-save" id="btn-save" onclick="saveIntention()">
        <i class="fa-solid fa-floppy-disk"></i> 保存する
      </button>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'http://127.0.0.1:8000';

  // URLパラメータ取得
  const _params    = new URLSearchParams(location.search);
  const _policyNo  = _params.get('policy_no') || '';
  const _from      = _params.get('from') || 'maturity';

  // 戻り先を設定
  const _backUrl = _from === 'maturity' ? 'maturity.html' : 'intention.html';
  document.getElementById('btn-back').href        = _backUrl;
  document.getElementById('btn-back-action').onclick = () => location.href = _backUrl;
  document.getElementById('btn-back').textContent =
    _from === 'maturity' ? '← 満期管理へ' : '← 意向確認一覧へ';

  function getToken() {
    const ut = sessionStorage.getItem('user_type');
    return sessionStorage.getItem(ut === 'staff' ? 'staff_token' : 'token') || '';
  }

  function getAuthHeader() {
    return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' };
  }

  // ステータスバッジHTML生成
  function statusBadge(s) {
    const cls = { '未記録': 'badge-unrecorded', '記録済': 'badge-recorded', '確認済': 'badge-confirmed' };
    return `<span class="status-badge ${cls[s] || 'badge-unrecorded'}">${s || '未記録'}</span>`;
  }

  // 確認済チェックボックス連動
  document.getElementById('f-customer-confirmed').addEventListener('change', function () {
    const row = document.getElementById('confirmed-at-row');
    if (this.checked) {
      const now = new Date();
      const dt  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ` +
                  `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      document.getElementById('f-confirmed-at').value = dt;
      row.style.display = '';
    } else {
      document.getElementById('f-confirmed-at').value = '';
      row.style.display = 'none';
    }
  });

  // ステータス変更で落ち理由セクション表示切替
  document.getElementById('f-status').addEventListener('change', function () {
    const show = ['他社移転','解約','失効','保留'].includes(this.value) ? '' : 'none';
    // 「落ち」系ステータスは現状の選択肢にはないが、拡張を考慮して残す
    document.getElementById('lapse-section').style.display = 'none';
  });

  // 画面初期化
  document.addEventListener('DOMContentLoaded', async () => {
    const token = requireAuth ? requireAuth() : getToken();
    if (!token) { location.href = 'login.html'; return; }

    if (!_policyNo) {
      document.getElementById('alert-error').style.display = '';
      document.getElementById('alert-error').textContent = '証券番号が指定されていません';
      return;
    }

    // 契約情報と意向確認データを取得
    await loadData();
  });

  async function loadData() {
    try {
      // 意向確認データ（なければ空テンプレート）
      const res = await fetch(`${API_BASE}/api/intentions/contract/${encodeURIComponent(_policyNo)}`, {
        headers: getAuthHeader()
      });
      if (!res.ok) throw new Error('取得失敗');
      const data = await res.json();

      // 契約情報エリアに表示
      document.getElementById('info-policy-no').textContent     = data.policy_no || _policyNo;
      document.getElementById('info-policy-type').textContent   = data.policy_type  || '—';
      document.getElementById('info-customer-name').textContent = data.customer_name || '—';
      document.getElementById('info-expiry-date').textContent   = data.expiry_date   || '—';
      document.getElementById('info-staff-code').textContent    = data.staff_code    || '—';
      document.getElementById('info-status').innerHTML          = statusBadge(data.status);

      // 隠しフィールド
      document.getElementById('intention-id').value           = data.id           || '';
      document.getElementById('intention-contract-id').value  = data.contract_id  || '';
      document.getElementById('intention-agency-code').value  = data.agency_code  || sessionStorage.getItem('agency_code') || '';

      // フォームフィールドに既存データをセット
      document.getElementById('f-customer-needs').value         = data.customer_needs        || '';
      document.getElementById('f-proposed-products').value      = data.proposed_products     || '';
      document.getElementById('f-compared-products').value      = data.compared_products     || '';
      document.getElementById('f-recommendation-reason').value  = data.recommendation_reason || '';
      document.getElementById('f-final-product').value          = data.final_product         || '';
      document.getElementById('f-customer-confirmed').checked   = !!data.customer_confirmed;
      document.getElementById('f-confirmed-at').value           = data.confirmed_at          || '';
      document.getElementById('f-status').value                 = data.status               || '未記録';
      document.getElementById('f-lapse-reason').value           = data.lapse_reason         || '';
      document.getElementById('f-lapse-detail').value           = data.lapse_detail         || '';

      // 確認済の場合は確認日時欄を表示
      if (data.customer_confirmed) {
        document.getElementById('confirmed-at-row').style.display = '';
      }

    } catch (e) {
      console.error('データ取得エラー:', e);
      document.getElementById('alert-error').style.display  = '';
      document.getElementById('alert-error').textContent    = '契約データの取得に失敗しました';
    }
  }

  async function saveIntention() {
    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = '保存中...';

    const id         = document.getElementById('intention-id').value;
    const agencyCode = document.getElementById('intention-agency-code').value
                     || sessionStorage.getItem('agency_code') || '';

    const body = {
      policy_no:             _policyNo,
      agency_code:           agencyCode,
      customer_name:         document.getElementById('info-customer-name').textContent,
      policy_type:           document.getElementById('info-policy-type').textContent,
      staff_code:            document.getElementById('info-staff-code').textContent,
      customer_needs:        document.getElementById('f-customer-needs').value.trim()        || null,
      proposed_products:     document.getElementById('f-proposed-products').value.trim()     || null,
      compared_products:     document.getElementById('f-compared-products').value.trim()     || null,
      recommendation_reason: document.getElementById('f-recommendation-reason').value.trim() || null,
      final_product:         document.getElementById('f-final-product').value.trim()         || null,
      customer_confirmed:    document.getElementById('f-customer-confirmed').checked ? 1 : 0,
      confirmed_at:          document.getElementById('f-confirmed-at').value  || null,
      lapse_reason:          document.getElementById('f-lapse-reason').value  || null,
      lapse_detail:          document.getElementById('f-lapse-detail').value.trim() || null,
      status:                document.getElementById('f-status').value,
    };

    // IDがあればPUT、なければPOST
    const url    = id ? `${API_BASE}/api/intentions/${id}` : `${API_BASE}/api/intentions`;
    const method = id ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, {
        method,
        headers: getAuthHeader(),
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || '保存に失敗しました');
      }

      // 保存成功
      const result = await res.json();
      if (!id && result.id) {
        document.getElementById('intention-id').value = result.id;
      }
      document.getElementById('alert-success').style.display = '';
      document.getElementById('alert-error').style.display   = 'none';
      document.getElementById('info-status').innerHTML = statusBadge(body.status);

      // 3秒後にアラートを非表示
      setTimeout(() => {
        document.getElementById('alert-success').style.display = 'none';
      }, 3000);

    } catch (e) {
      console.error('保存エラー:', e);
      document.getElementById('alert-error').style.display  = '';
      document.getElementById('alert-error').textContent    = `❌ ${e.message}`;
    } finally {
      btn.disabled    = false;
      btn.innerHTML   = '<i class="fa-solid fa-floppy-disk"></i> 保存する';
    }
  }
</script>
</body>
</html>
