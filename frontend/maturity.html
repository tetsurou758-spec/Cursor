<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>満期管理システム｜AX損害保険株式会社</title>
  <link rel="stylesheet" href="js/theme.css">
  <script src="js/session.js"></script>
  <script>applyTheme()</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--gray-bg);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: var(--text-main);
      font-size: 13px;
    }

    /* ═══ HEADER ═══════════════════════════════════════════════ */
    .site-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 12px var(--primary-shadow);
    }
    .header-logo { display:flex; align-items:center; gap:10px; color:#fff; text-decoration:none; }
    .header-logo svg { width:28px; height:28px; flex-shrink:0; }
    .header-logo-text .company { font-size:1.02rem; font-weight:700; letter-spacing:0.08em; color:var(--accent); }
    .header-logo-text .system  { font-size:1.05rem; font-weight:700; letter-spacing:0.04em; color:#fff; }
    .header-right { display:flex; align-items:center; gap:10px; }
    .page-badge {
      background: rgba(255,255,255,0.15); border: 1px solid var(--accent-border);
      color: var(--accent-light); border-radius:4px; padding:3px 10px;
      font-size:0.75rem; font-weight:700;
    }
    .user-badge {
      background: rgba(255,255,255,0.1); border: 1px solid var(--accent-border);
      border-radius:20px; padding:4px 14px; color:#fff; font-size:0.8rem;
    }
    .user-badge span { color:var(--accent); font-weight:700; margin-right:6px; }
    .btn-logout {
      background:transparent; border:1.5px solid var(--accent-border-btn);
      color:var(--accent-light); border-radius:4px; padding:5px 14px;
      font-size:0.78rem; font-weight:600; cursor:pointer;
      transition:background 0.2s,color 0.2s;
    }
    .btn-logout:hover { background:var(--accent); color:var(--primary-dark); border-color:var(--accent); }
    .btn-back {
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.25);
      color:#fff; border-radius:4px; padding:5px 12px;
      font-size:0.75rem; cursor:pointer; text-decoration:none;
      transition:background 0.2s;
    }
    .btn-back:hover { background:rgba(255,255,255,0.18); }
    .accent-bar { height:3px; background:linear-gradient(90deg,var(--primary-dark) 0%,var(--accent) 50%,var(--primary-dark) 100%); }

    /* ═══ MAIN ══════════════════════════════════════════════════ */
    .main-content { max-width:1400px; margin:0 auto; padding:20px 16px 40px; }
    .page-title {
      font-size:1.1rem; font-weight:700; color:var(--primary);
      margin-bottom:16px; display:flex; align-items:center; gap:8px;
    }
    .page-title::before { content:''; display:inline-block; width:4px; height:20px; background:var(--accent); border-radius:2px; }

    /* ═══ SEARCH CARD ═══════════════════════════════════════════ */
    .search-card { background:#fff; border-radius:8px; box-shadow:0 2px 10px var(--card-shadow); padding:18px 20px; margin-bottom:16px; }
    .search-grid { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
    .field-group { display:flex; flex-direction:column; gap:4px; }
    .field-group label { font-size:0.72rem; font-weight:600; color:var(--primary); letter-spacing:0.04em; }
    .field-group input, .field-group select {
      border:1.5px solid var(--gray-border); border-radius:4px;
      padding:6px 10px; font-size:0.82rem; color:var(--text-main);
      outline:none; background:#fff; transition:border-color 0.2s; height:32px;
    }
    .field-group input:focus, .field-group select:focus { border-color:var(--primary); box-shadow:0 0 0 2px var(--card-shadow); }
    .field-group.date input { width:140px; }
    .field-group.text input { width:110px; }
    .field-group.sel select { width:120px; }
    .btn-group { display:flex; gap:8px; align-items:flex-end; }
    .btn-search {
      background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);
      color:#fff; border:none; border-radius:4px;
      padding:0 20px; height:32px; font-size:0.82rem; font-weight:700;
      cursor:pointer; transition:opacity 0.2s;
    }
    .btn-search:hover { opacity:0.88; }
    .btn-clear {
      background:#fff; color:var(--primary); border:1.5px solid var(--gray-border);
      border-radius:4px; padding:0 16px; height:32px;
      font-size:0.82rem; cursor:pointer; transition:border-color 0.2s;
    }
    .btn-clear:hover { border-color:var(--primary); }

    .result-info { font-size:0.8rem; color:var(--text-sub); margin-bottom:10px; padding-left:4px; }
    .result-info strong { color:var(--primary); font-size:1rem; }

    /* ═══ TABLE CARD ═════════════════════════════════════════════ */
    .table-card { background:#fff; border-radius:8px; box-shadow:0 2px 10px var(--card-shadow); overflow:hidden; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; white-space:nowrap; }

    thead tr { background:var(--primary); }
    thead th {
      color:#fff; font-size:0.72rem; font-weight:700;
      padding:9px 8px; text-align:center; letter-spacing:0.04em;
      border-right:1px solid rgba(255,255,255,0.1); white-space:nowrap;
    }
    thead th:last-child { border-right:none; }
    thead th.sortable { cursor:pointer; user-select:none; }
    thead th.sortable:hover { background:var(--primary-light); }
    thead th.sort-active { background:rgba(255,255,255,0.2) !important; }
    .sort-icon { display:inline-block; margin-left:4px; font-size:0.8rem; font-style:normal; color:var(--accent); font-weight:700; vertical-align:middle; }

    tbody tr.main-row { transition:background 0.15s; }
    tbody tr.main-row:hover { background:var(--gray-card); }
    tbody tr.main-row.highlight-month { background:var(--highlight-row); }
    tbody tr.main-row.highlight-month:hover { background:var(--accent-light); }

    tbody td { padding:7px 8px; border-bottom:1px solid var(--gray-border); text-align:center; font-size:0.78rem; color:var(--text-main); vertical-align:middle; }
    tbody td.td-left { text-align:left; }

    tr.detail-row td { background:var(--gray-card); padding:0; border-bottom:2px solid var(--primary); }
    .detail-inner { padding:14px 20px; display:grid; grid-template-columns:repeat(5,1fr); gap:12px 20px; }
    .detail-item label { display:block; font-size:0.68rem; color:var(--detail-label-color); font-weight:700; margin-bottom:3px; }
    .detail-item span { font-size:0.82rem; color:var(--text-main); }
    .detail-item.memo-item { grid-column:span 2; }

    .toggle-btn {
      width:22px; height:22px; border-radius:50%;
      background:var(--primary); color:#fff;
      border:none; font-size:0.85rem; font-weight:700;
      cursor:pointer; line-height:1; transition:background 0.2s;
    }
    .toggle-btn:hover { background:var(--primary-light); }
    .toggle-btn.open { background:var(--accent); color:var(--primary-dark); }

    .badge { display:inline-block; border-radius:12px; padding:2px 9px; font-size:0.7rem; font-weight:700; white-space:nowrap; }
    .badge-red    { background:#f8d7da; color:#721c24; }
    .badge-orange { background:#fff3cd; color:#856404; }
    .badge-green  { background:#d4edda; color:#155724; }
    .badge-gray   { background:#e9ecef; color:#495057; }

    .icon-flag { font-size:1rem; }
    .icon-none { color:var(--gray-border); font-size:0.85rem; }

    .type-badge { display:inline-block; border-radius:3px; padding:1px 7px; font-size:0.7rem; font-weight:700; }
    .type-auto  { background:#e8f4fd; color:#0c5460; }
    .type-fire  { background:#fde8e8; color:#721c24; }
    .type-acc   { background:#e8fde8; color:#155724; }
    .type-other { background:#f0e8fd; color:#4a1272; }

    .contact-wrap { text-align:left; }
    .contact-method { font-size:0.7rem; background:var(--gray-card); border-radius:3px; padding:1px 5px; color:var(--primary); font-weight:600; }
    .contact-info   { font-size:0.72rem; color:var(--text-sub); display:block; margin-top:2px; }

    .notice-link { color:var(--primary); font-size:0.75rem; text-decoration:underline; cursor:pointer; }
    .customer-link { color:var(--primary); text-decoration:none; cursor:pointer; font-weight:600; }
    .customer-link:hover { text-decoration:underline; color:var(--accent,#FFD700); filter:brightness(0.85); }
    .premium { text-align:right; font-size:0.8rem; font-weight:600; color:var(--primary); }
    .empty-msg { text-align:center; padding:40px; color:var(--text-sub); font-size:0.9rem; }

    .site-footer { background:var(--primary-dark); color:rgba(255,255,255,0.45); text-align:center; font-size:0.7rem; letter-spacing:0.06em; padding:14px 16px; margin-top:40px; }

    @media (max-width:768px) { .search-grid { flex-direction:column; } .field-group.date input, .field-group.text input, .field-group.sel select { width:100%; } .detail-inner { grid-template-columns:repeat(2,1fr); } }

    /* ═══ インラインポップオーバー ═══════════════════════════════ */
    .popover-backdrop {
      display:none; position:fixed; inset:0; z-index:500;
      background:rgba(0,0,0,.25);   /* 半透明で背面を暗くしてモーダルを明示 */
      cursor:default;               /* 背面要素のカーソルを無効化 */
    }
    .popover-backdrop.open { display:block; }
    .popover {
      display:none; position:fixed; z-index:600;
      background:#fff; border-radius:8px;
      box-shadow:0 4px 20px rgba(0,0,0,.18);
      border:1px solid var(--gray-border);
      padding:14px 16px; min-width:220px;
    }
    .popover.open { display:block; }
    .popover-title { font-size:0.76rem; font-weight:700; color:var(--primary); margin-bottom:10px; }
    .popover textarea {
      width:100%; height:72px; resize:vertical;
      border:1.5px solid var(--gray-border); border-radius:4px;
      padding:6px 8px; font-size:0.82rem; font-family:inherit;
      outline:none; transition:border-color .2s;
    }
    .popover textarea:focus { border-color:var(--primary); }
    .popover input[type="date"] {
      width:100%; height:32px;
      border:1.5px solid var(--gray-border); border-radius:4px;
      padding:0 8px; font-size:0.82rem; outline:none;
      transition:border-color .2s;
    }
    .popover input[type="date"]:focus { border-color:var(--primary); }
    .popover select {
      width:100%; height:32px;
      border:1.5px solid var(--gray-border); border-radius:4px;
      padding:0 8px; font-size:0.82rem; outline:none;
      transition:border-color .2s; background:#fff;
    }
    .popover select:focus { border-color:var(--primary); }
    .popover-comment {
      margin-top:8px;
      display:none;
    }
    .popover-comment textarea { height:56px; }
    .popover-actions { display:flex; gap:8px; margin-top:10px; justify-content:flex-end; }
    .pop-btn-save {
      height:28px; padding:0 14px; font-size:0.78rem; font-weight:700;
      background:var(--primary); color:#fff; border:none; border-radius:4px; cursor:pointer;
    }
    .pop-btn-save:hover { opacity:.88; }
    .pop-btn-cancel {
      height:28px; padding:0 12px; font-size:0.78rem;
      background:#fff; color:var(--text-sub);
      border:1.5px solid var(--gray-border); border-radius:4px; cursor:pointer;
    }
    .pop-btn-cancel:hover { border-color:var(--primary); }

    /* クリック可能アイコン */
    .icon-clickable { cursor:pointer; font-size:1rem; display:inline-block; }
    .icon-clickable:hover { opacity:.75; }
    .fc-done { font-size:0.75rem; font-weight:700; color:#155724; cursor:pointer; white-space:nowrap; }
    .fc-done:hover { opacity:.75; }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-logo">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M32 4L8 14v18c0 13.3 10.3 25.7 24 29 13.7-3.3 24-15.7 24-29V14L32 4z"
            fill="none" stroke="var(--accent)" stroke-width="3" stroke-linejoin="round"/>
      <path d="M32 12L14 20v12c0 9 6.8 17.4 18 20.4C45.2 49.4 52 41 52 32V20L32 12z"
            fill="rgba(255,255,255,0.15)"/>
      <polyline points="22,32 29,39 43,25" stroke="var(--accent-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="header-logo-text">
      <div class="company">AX損害保険株式会社</div>
      <div class="system" id="hdr-system-name">満期管理システム</div>
    </div>
  </div>
  <div class="header-right">
    <span class="page-badge">満期管理</span>
    <div class="user-badge"><span id="hdr-code">--</span><span id="hdr-name" style="color:#fff;font-weight:400">--</span></div>
    <a href="#" class="btn-back" onclick="goToDashboard(); return false;">← ダッシュボード</a>
    <button class="btn-logout" id="btn-logout">ログアウト</button>
  </div>
</header>
<div class="accent-bar"></div>

<div class="main-content">
  <div class="page-title" id="page-title">満期管理一覧</div>

  <div class="search-card">
    <div class="search-grid">
      <div class="field-group date">
        <label>満期年月日 FROM</label>
        <input type="date" id="date-from">
      </div>
      <div class="field-group date">
        <label>満期年月日 TO</label>
        <input type="date" id="date-to">
      </div>
      <div class="field-group text">
        <label>顧客氏名</label>
        <input type="text" id="customer-name" placeholder="部分一致">
      </div>
      <div class="field-group text">
        <label>担当者コード</label>
        <input type="text" id="staff-code" placeholder="例）S001">
      </div>
      <!-- 社員専用フィルター -->
      <div class="field-group text staff-only" id="agency-filter-group" style="display:none">
        <label>代理店コード</label>
        <input type="text" id="agency-code-filter" placeholder="例）A001">
      </div>
      <div class="field-group text staff-only" id="buka-filter-group" style="display:none">
        <label>部課コード</label>
        <input type="text" id="buka-code-filter" placeholder="例）X001">
      </div>
      <div class="field-group sel">
        <label>種目</label>
        <select id="policy-type">
          <option value="">全て</option>
          <option value="自動車">自動車</option>
          <option value="火災">火災</option>
          <option value="傷害">傷害</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field-group sel">
        <label>更改STS</label>
        <select id="renewal-status">
          <option value="">全て</option>
          <option value="未対応">未対応</option>
          <option value="対応中">対応中</option>
          <option value="更改済">更改済</option>
          <option value="落ち">落ち</option>
        </select>
      </div>
      <div class="field-group sel">
        <label>フォローコールSTS</label>
        <select id="followcall-status">
          <option value="">全て</option>
          <option value="未実施">未実施</option>
          <option value="実施済">実施済</option>
        </select>
      </div>
      <div class="btn-group">
        <button class="btn-search" onclick="doSearch()">検索</button>
        <button class="btn-clear"  onclick="clearSearch()">クリア</button>
      </div>
    </div>
  </div>

  <div class="result-info" id="result-info">— 件</div>

  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px"></th>
            <th>部課</th>
            <th>代理店</th>
            <th class="sortable" id="th-expiry_date" onclick="sortBy('expiry_date')">満期年月日<i class="sort-icon" id="sort-expiry_date">↕</i></th>
            <th>証券番号</th>
            <th>顧客名</th>
            <th>種目</th>
            <th class="sortable" id="th-staff_code" onclick="sortBy('staff_code')">担当者<i class="sort-icon" id="sort-staff_code">↕</i></th>
            <th>連絡手段 / 連絡先</th>
            <th class="sortable" id="th-annual_premium" onclick="sortBy('annual_premium')">年換算保険料<i class="sort-icon" id="sort-annual_premium">↕</i></th>
            <th title="事故フラグ">事故</th>
            <th title="異動フラグ">異動</th>
            <th title="メモ">メモ</th>
            <th>発送予定日</th>
            <th>帳票</th>
            <th style="width:66px">ﾌｫﾛｰｺｰﾙ</th>
            <th style="width:70px">更改STS</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="17" class="empty-msg">検索ボタンを押してください</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ポップオーバー背景クリックで閉じる -->
<div class="popover-backdrop" id="pop-backdrop" onclick="closePopover()"></div>

<!-- メモ編集ポップオーバー -->
<div class="popover" id="pop-memo">
  <div class="popover-title">📝 メモ編集</div>
  <textarea id="pop-memo-text" placeholder="メモを入力..."></textarea>
  <div class="popover-actions">
    <button class="pop-btn-cancel" onclick="closePopover()">キャンセル</button>
    <button class="pop-btn-save"   onclick="saveMemo()">登録</button>
  </div>
</div>

<!-- フォローコール日付ポップオーバー -->
<div class="popover" id="pop-fc">
  <div class="popover-title">📞 フォローコール日付登録</div>
  <input type="date" id="pop-fc-date">
  <div class="popover-actions">
    <button class="pop-btn-cancel" onclick="closePopover()">キャンセル</button>
    <button class="pop-btn-save"   onclick="saveFollowcall()">登録</button>
  </div>
</div>

<!-- 更改STS変更ポップオーバー -->
<div class="popover" id="pop-renewal">
  <div class="popover-title">🔄 更改ステータス変更</div>
  <select id="pop-renewal-select" onchange="onRenewalSelectChange()">
    <option value="未対応">未対応</option>
    <option value="対応中">対応中</option>
    <option value="落ち">落ち</option>
  </select>
  <div class="popover-comment" id="pop-renewal-comment">
    <textarea id="pop-renewal-memo" placeholder="コメントを入力（コンタクト履歴「満期落ち」として登録されます）"></textarea>
  </div>
  <div class="popover-actions">
    <button class="pop-btn-cancel" onclick="closePopover()">キャンセル</button>
    <button class="pop-btn-save"   onclick="saveRenewal()">登録</button>
  </div>
</div>

<footer class="site-footer">&copy; 2026 AX損害保険株式会社. All Rights Reserved.</footer>

<script>
  const API_BASE   = 'http://127.0.0.1:8000';
  const THIS_MONTH = (() => {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  })();

  let currentData  = [];
  let originalData = [];
  let sortCol      = null;
  let sortDir      = 1;
  let isStaff      = false;

  const SORT_COLS = ['expiry_date', 'staff_code', 'annual_premium'];

  document.addEventListener('DOMContentLoaded', () => {
    const token = requireAuth();
    if (!token) return;

    isStaff = (_ssGet('user_type') === 'staff');

    if (isStaff) {
      document.getElementById('hdr-system-name').textContent = '満期管理システム（社員）';
      document.getElementById('page-title').textContent = '満期管理一覧（社員ビュー）';
      document.querySelectorAll('.staff-only').forEach(el => el.style.display = '');

      const staffCode = _ssGet('staff_code') || '';
      const staffName = _ssGet('staff_name') || '';
      document.getElementById('hdr-code').textContent = staffCode + ' ';
      document.getElementById('hdr-name').textContent = staffName;
    } else {
      const agencyCode = _ssGet('agency_code') || '';
      const loginId    = _ssGet('login_id')    || '';
      document.getElementById('hdr-code').textContent = agencyCode + ' ';
      document.getElementById('hdr-name').textContent = loginId;
    }

    document.getElementById('btn-logout').addEventListener('click', doLogout);

    // URLパラメータによる初期検索設定
    const _up = new URLSearchParams(location.search);
    const _upCustName    = _up.get('customer_name') || '';
    const _upTel         = _up.get('tel')           || '';
    const _upContractNo  = _up.get('contract_no')   || '';
    const _upRenewal     = _up.get('renewal_status') || '';
    const _upMonth       = _up.get('expiry_month')   || '';

    if (_upCustName)   document.getElementById('customer-name').value = _upCustName;
    if (_upRenewal)    document.getElementById('renewal-status').value = _upRenewal;

    if (_upMonth) {
      const [my, mm] = _upMonth.split('-');
      const lastDay  = new Date(Number(my), Number(mm), 0).getDate();
      const pad      = n => String(n).padStart(2, '0');
      document.getElementById('date-from').value = `${my}-${pad(mm)}-01`;
      document.getElementById('date-to').value   = `${my}-${pad(mm)}-${pad(lastDay)}`;
    }

    // 初期表示は全件（日付フィルタなし）
    doSearch();
  });

  async function doSearch() {
    const token   = _ssGet(isStaff ? 'staff_token' : 'token');
    const params  = new URLSearchParams();
    const dateFrom   = document.getElementById('date-from').value;
    const dateTo     = document.getElementById('date-to').value;
    const staff      = document.getElementById('staff-code').value.trim();
    const ptype      = document.getElementById('policy-type').value;
    const rsts       = document.getElementById('renewal-status').value;
    const fcsts      = document.getElementById('followcall-status').value;
    const custName   = document.getElementById('customer-name').value.trim();

    if (dateFrom)  params.set('date_from',         dateFrom);
    if (dateTo)    params.set('date_to',            dateTo);
    if (staff)     params.set('staff_code',         staff);
    if (ptype)     params.set('policy_type',        ptype);
    if (rsts)      params.set('renewal_status',     rsts);
    if (fcsts)     params.set('followcall_status',  fcsts);
    if (custName)  params.set('customer_name',      custName);

    try {
      const res = await fetch(`${API_BASE}/api/maturity?${params}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401) { doLogout(); return; }
      const data = await res.json();

      let rows = data.contracts || [];

      if (isStaff) {
        const agencyFilter = (document.getElementById('agency-code-filter')?.value || '').trim().toLowerCase();
        const bukaFilter   = (document.getElementById('buka-code-filter')?.value   || '').trim().toLowerCase();
        if (agencyFilter) rows = rows.filter(c => (c.agency_code||'').toLowerCase().includes(agencyFilter));
        if (bukaFilter)   rows = rows.filter(c => (c.buka_code||'').toLowerCase().includes(bukaFilter));
      }

      originalData = rows;
      currentData  = [...rows];
      sortCol = null; sortDir = 1;
      updateSortIndicators();
      renderTable(currentData);
      document.getElementById('result-info').innerHTML =
        `検索結果：<strong>${currentData.length}</strong> 件`;
    } catch(e) {
      document.getElementById('result-info').textContent = '取得エラー：サーバーを確認してください';
    }
  }

  function clearSearch() {
    ['date-from','date-to','customer-name','staff-code','policy-type','renewal-status','followcall-status'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    ['agency-code-filter','buka-code-filter'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    doSearch();
  }

  function sortBy(col) {
    if (sortCol !== col) { sortCol = col; sortDir = 1; }
    else if (sortDir === 1) { sortDir = -1; }
    else { sortCol = null; }

    currentData = sortCol === null ? [...originalData] : [...originalData].sort((a,b) => {
      let va = a[col], vb = b[col];
      if (col === 'annual_premium') { va = Number(va)||0; vb = Number(vb)||0; }
      else { va = va||''; vb = vb||''; }
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
    updateSortIndicators();
    renderTable(currentData);
  }

  function updateSortIndicators() {
    SORT_COLS.forEach(c => {
      const icon = document.getElementById('sort-' + c);
      const th   = document.getElementById('th-' + c);
      if (!icon || !th) return;
      if (sortCol === c) { icon.textContent = sortDir === 1 ? '↑' : '↓'; th.classList.add('sort-active'); }
      else { icon.textContent = '↕'; th.classList.remove('sort-active'); }
    });
  }

  function toggle(idx) {
    const detail = document.getElementById(`detail-${idx}`);
    const btn    = document.getElementById(`btn-${idx}`);
    const isOpen = detail.style.display !== 'none';
    detail.style.display = isOpen ? 'none' : 'table-row';
    btn.textContent = isOpen ? '＋' : '－';
    btn.classList.toggle('open', !isOpen);
  }

  function renewalBadge(s) {
    if (!s) return '<span class="icon-none">—</span>';
    const cls = {'未対応':'badge-red','対応中':'badge-orange','更改済':'badge-green','落ち':'badge-gray'}[s]||'badge-gray';
    return `<span class="badge ${cls}">${s}</span>`;
  }
  function followcallBadge(s, contractId) {
    // s = null/'' → 未実施（電話アイコン）、s = 日付文字列 → MM/DD済
    if (!s) {
      return `<span class="icon-clickable" title="フォローコール未実施" onclick="openFcPopover(event,${contractId},'')">📞</span>`;
    }
    const mm = s.slice(5, 7), dd = s.slice(8, 10);
    return `<span class="fc-done" title="${s} 実施済" onclick="openFcPopover(event,${contractId},'${s}')">${mm}/${dd}済</span>`;
  }
  function typeBadge(t) {
    if (!t) return '—';
    const cls={'自動車':'type-auto','火災':'type-fire','傷害':'type-acc','その他':'type-other'}[t]||'';
    return `<span class="type-badge ${cls}">${t}</span>`;
  }
  function yen(v) { return v!=null ? '¥'+Number(v).toLocaleString() : '—'; }
  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── ポップオーバー共通 ────────────────────────────────────────
  let _popContractId   = null;
  let _popCustomerId   = null;
  let _activePopover   = null;

  function positionPopover(pop, event) {
    const el = event.currentTarget || event.target;
    const rect = el.getBoundingClientRect();
    const vw = window.innerWidth, vh = window.innerHeight;
    pop.style.display = 'block';
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    let left = rect.left, top = rect.bottom + 6;
    if (left + pw > vw - 12) left = vw - pw - 12;
    if (top + ph > vh - 12) top = rect.top - ph - 6;
    pop.style.left = left + 'px';
    pop.style.top  = top  + 'px';
    pop.style.display = '';
  }

  function openPopover(id, event) {
    closePopover();
    const pop = document.getElementById(id);
    document.getElementById('pop-backdrop').classList.add('open');
    pop.classList.add('open');
    positionPopover(pop, event);
    _activePopover = id;
  }

  function closePopover() {
    if (_activePopover) {
      document.getElementById(_activePopover)?.classList.remove('open');
      _activePopover = null;
    }
    document.getElementById('pop-backdrop').classList.remove('open');
    _popContractId = null;
    _popCustomerId = null;
  }

  // ── メモ ────────────────────────────────────────────────────
  function openMemoPopover(event, contractId, currentMemo) {
    document.getElementById('pop-memo-text').value = currentMemo;
    openPopover('pop-memo', event);
    _popContractId = contractId; // openPopover内のclosePopover()後にセット
    document.getElementById('pop-memo-text').focus();
  }

  async function saveMemo() {
    const memo = document.getElementById('pop-memo-text').value.trim();
    const token = _ssGet(isStaff ? 'staff_token' : 'token');
    console.log('[saveMemo] contractId=', _popContractId, 'token=', token ? token.slice(0,20)+'...' : 'null');
    try {
      const res = await fetch(`${API_BASE}/api/maturity/${_popContractId}/memo`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ memo: memo || null }),
      });
      console.log('[saveMemo] status=', res.status);
      if (!res.ok) {
        const errBody = await res.text();
        console.error('[saveMemo] error body=', errBody);
        alert(`更新に失敗しました (${res.status})\n${errBody}`);
        return;
      }
      // セルを動的に更新
      const cell = document.getElementById(`memo-cell-${_popContractId}`);
      if (cell) {
        const id = _popContractId;
        if (memo) {
          cell.innerHTML = `<span class="icon-clickable" title="${esc(memo)}" onclick="openMemoPopover(event,${id},'${esc(memo).replace(/'/g,'&#39;')}')">📌</span>`;
        } else {
          cell.innerHTML = `<span class="icon-clickable" title="メモを追加" onclick="openMemoPopover(event,${id},'')">✏️</span>`;
        }
      }
      closePopover();
    } catch (e) { alert('通信エラー'); }
  }

  // ── フォローコール ───────────────────────────────────────────
  function openFcPopover(event, contractId, currentDate) {
    const input = document.getElementById('pop-fc-date');
    input.value = currentDate || new Date().toISOString().slice(0, 10);
    openPopover('pop-fc', event);
    _popContractId = contractId; // openPopover内のclosePopover()後にセット
    input.focus();
  }

  async function saveFollowcall() {
    const dateVal = document.getElementById('pop-fc-date').value;
    if (!dateVal) { alert('日付を選択してください'); return; }
    const token = _ssGet(isStaff ? 'staff_token' : 'token');
    console.log('[saveFollowcall] contractId=', _popContractId, 'date=', dateVal);
    try {
      const res = await fetch(`${API_BASE}/api/maturity/${_popContractId}/followcall`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ followcall_date: dateVal }),
      });
      console.log('[saveFollowcall] status=', res.status);
      if (!res.ok) {
        const errBody = await res.text();
        console.error('[saveFollowcall] error body=', errBody);
        alert(`更新に失敗しました (${res.status})\n${errBody}`);
        return;
      }
      const cell = document.getElementById(`fc-cell-${_popContractId}`);
      if (cell) cell.innerHTML = followcallBadge(dateVal, _popContractId);
      closePopover();
    } catch (e) { alert('通信エラー'); }
  }

  // ── 更改STS ─────────────────────────────────────────────────
  function openRenewalPopover(event, contractId, currentStatus, customerId) {
    const sel = document.getElementById('pop-renewal-select');
    sel.value = currentStatus || '未対応';
    onRenewalSelectChange();
    openPopover('pop-renewal', event);
    _popContractId = contractId; // openPopover内のclosePopover()後にセット
    _popCustomerId = customerId;
  }

  function onRenewalSelectChange() {
    const val = document.getElementById('pop-renewal-select').value;
    const commentDiv = document.getElementById('pop-renewal-comment');
    // 「落ち」選択時にコメント欄を表示（コンタクト履歴「満期落ち」として登録される）
    commentDiv.style.display = val === '落ち' ? 'block' : 'none';
    if (val !== '落ち') document.getElementById('pop-renewal-memo').value = '';
  }

  async function saveRenewal() {
    const status = document.getElementById('pop-renewal-select').value;
    const memo   = document.getElementById('pop-renewal-memo').value.trim();
    const token  = _ssGet(isStaff ? 'staff_token' : 'token');
    console.log('[saveRenewal] contractId=', _popContractId, 'status=', status, 'customerId=', _popCustomerId);
    try {
      const body = { renewal_status: status };
      if (status === '落ち') {
        body.memo        = memo || null;
        body.customer_id = _popCustomerId;
      }
      const res = await fetch(`${API_BASE}/api/maturity/${_popContractId}/renewal`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify(body),
      });
      console.log('[saveRenewal] status=', res.status);
      if (!res.ok) {
        const errBody = await res.text();
        console.error('[saveRenewal] error body=', errBody);
        alert(`更新に失敗しました (${res.status})\n${errBody}`);
        return;
      }
      const cell = document.getElementById(`renewal-cell-${_popContractId}`);
      if (cell) {
        const id = _popContractId, cid = _popCustomerId;
        if (status === '更改済') {
          cell.innerHTML = renewalBadge(status);
        } else {
          cell.innerHTML = `<span style="cursor:pointer" onclick="openRenewalPopover(event,${id},'${status}',${cid||'null'})">${renewalBadge(status)}</span>`;
        }
      }
      closePopover();
    } catch (e) { alert('通信エラー'); }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopover(); });

  function renderTable(rows) {
    const tbody = document.getElementById('table-body');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="17" class="empty-msg">該当するデータがありません</td></tr>';
      return;
    }
    tbody.innerHTML = rows.map((c, idx) => {
      const isThisMonth = c.expiry_date && c.expiry_date.startsWith(THIS_MONTH);
      const rawNo = c.contract_no || c.policy_number || '';
      const pno = rawNo
        ? `<a href="contract_detail.html?contract_no=${encodeURIComponent(rawNo)}&from=maturity" style="color:var(--primary);font-weight:600;text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${esc(rawNo)}</a>`
        : '—';
      const memoVal = c.memo || '';
      const memoCell = memoVal
        ? `<span class="icon-clickable" title="${esc(memoVal)}" onclick="openMemoPopover(event,${c.id},'${esc(memoVal).replace(/'/g,'&#39;')}')">📌</span>`
        : `<span class="icon-clickable" title="メモを追加" onclick="openMemoPopover(event,${c.id},'')">✏️</span>`;

      const renewalClickable = c.renewal_status !== '更改済';
      const renewalCell = renewalClickable
        ? `<span style="cursor:pointer" onclick="openRenewalPopover(event,${c.id},'${esc(c.renewal_status||'')}',${c.linked_customer_id||'null'})">${renewalBadge(c.renewal_status)}</span>`
        : renewalBadge(c.renewal_status);

      return `
        <tr class="main-row${isThisMonth?' highlight-month':''}">
          <td><button class="toggle-btn" id="btn-${idx}" onclick="toggle(${idx})">＋</button></td>
          <td style="font-size:0.72rem">${esc(c.buka_code)||'—'}</td>
          <td style="font-size:0.72rem">${esc(c.agency_code)||'—'}</td>
          <td>${c.expiry_date||'—'}</td>
          <td style="font-size:0.72rem">${pno}</td>
          <td class="td-left" style="min-width:90px">${c.linked_customer_id
            ? `<a class="customer-link" href="customer.html?customer_id=${c.linked_customer_id}&expand=true">${esc(c.customer_name)}</a>`
            : esc(c.customer_name)}</td>
          <td>${typeBadge(c.policy_type)}</td>
          <td>${esc(c.staff_code)||'—'}</td>
          <td class="td-left"><div class="contact-wrap"><span class="contact-method">${esc(c.contact_method)||'—'}</span><span class="contact-info">${esc(c.contact_info)||'—'}</span></div></td>
          <td class="premium">${yen(c.annual_premium)}</td>
          <td>${c.has_accident?`<a href="claim_detail.html?contract_no=${encodeURIComponent(c.contract_no)}&from=maturity" title="保険金支払状況を見る"><span class="icon-flag">🔴</span></a>`:'<span class="icon-none">○</span>'}</td>
          <td>${c.has_change?'<span class="icon-flag">📝</span>':'<span class="icon-none">○</span>'}</td>
          <td id="memo-cell-${c.id}">${memoCell}</td>
          <td>${c.notice_date||'—'}</td>
          <td>${c.notice_type?`<a class="notice-link" href="#" onclick="return false">${esc(c.notice_type)}</a>`:'—'}</td>
          <td id="fc-cell-${c.id}">${followcallBadge(c.followcall_status, c.id)}</td>
          <td id="renewal-cell-${c.id}">${renewalCell}</td>
        </tr>
        <tr class="detail-row" id="detail-${idx}" style="display:none">
          <td colspan="17">
            <div class="detail-inner">
              <div class="detail-item"><label>更改後証券番号</label><span>${esc(c.renewed_policy_number)||'—'}</span></div>
              <div class="detail-item"><label>更改後年換算保険料</label><span>${yen(c.renewed_premium)}</span></div>
              <div class="detail-item"><label>アップセルSTS</label><span>${esc(c.upsell_status)||'—'}</span></div>
              <div class="detail-item"><label>落ちSTS</label><span>${c.lapse_status?'<span class="badge badge-gray">落ち</span>':'—'}</span></div>
              <div class="detail-item memo-item"><label>メモ</label><span>${esc(memoVal)||'（なし）'}</span></div>
            </div>
          </td>
        </tr>`;
    }).join('');
  }
</script>
</body>
</html>
