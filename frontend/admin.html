<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー管理｜AX損害保険株式会社</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0d2b5e;
      --navy-dark: #091e45;
      --navy-mid:  #1a3a72;
      --navy-light:#2d4f8e;
      --gold:      #c9a84c;
      --gold-light:#e2c47a;
      --white:     #ffffff;
      --gray-bg:   #f0f2f7;
      --gray-card: #f7f9fc;
      --gray-border:#e0e5f0;
      --text-main: #1a1a2e;
      --text-sub:  #5a6480;
      --red:       #c0392b;
      --red-bg:    #fdf0f0;
      --green:     #1e7e34;
      --green-bg:  #d4edda;
    }

    body {
      background: var(--gray-bg);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: var(--text-main);
      min-width: 320px;
    }

    /* ════════════════════════ HEADER ════════════════════════════════════════════ */
    .site-header {
      background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(9,30,69,0.35);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      text-decoration: none;
    }

    .header-logo svg { width: 28px; height: 28px; flex-shrink: 0; }

    .header-logo-text { line-height: 1.2; }

    .header-logo-text .company { font-size: 1.02rem; font-weight: 700; letter-spacing: 0.08em; color: #FFD700; }

    .header-logo-text .system  { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.04em; color: var(--white); }

    .header-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-back-link {
      color: var(--gold-light);
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(201,168,76,0.5);
      border-radius: 4px;
      padding: 4px 10px;
      letter-spacing: 0.04em;
      transition: background 0.2s;
    }

    .header-back-link:hover { background: rgba(201,168,76,0.15); color: #FFD700; }

    .user-badge {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }

    .user-badge .badge-agency { color: var(--gold-light); font-weight: 700; margin-right: 2px; }
    .user-badge .badge-login  { color: #fff; font-weight: 400; }
    .user-badge .badge-role   { color: var(--gold-light); font-weight: 600; margin-left: 2px; }

    .btn-logout {
      background: transparent;
      border: 1.5px solid rgba(201,168,76,0.6);
      color: var(--gold-light);
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.06em;
    }

    .btn-logout:hover { background: var(--gold); color: var(--navy-dark); border-color: var(--gold); }

    .gold-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--navy-dark) 0%, var(--gold) 50%, var(--navy-dark) 100%);
    }

    /* ════════════════════════ MAIN ══════════════════════════════════════════════ */
    .main-content { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--text-sub);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 14px;
      background: var(--gold);
      border-radius: 2px;
    }

    /* ════════════════════════ SECTION HEADER ════════════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
      color: var(--white);
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px rgba(13,43,94,0.25);
    }

    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ════════════════════════ TABLE ═════════════════════════════════════════════ */
    .card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(13,43,94,0.08);
      overflow: hidden;
      margin-bottom: 32px;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead { background: var(--navy); color: var(--white); }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.04em;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--gray-border); }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: var(--gray-card); }

    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    /* ステータスバッジ */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .badge-active   { background: var(--green-bg); color: var(--green); }
    .badge-inactive { background: #f8d7da; color: #721c24; }

    .role-chip {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .role-1 { background: #e8edf8; color: var(--navy); }
    .role-2 { background: #fff8e6; color: #8a6820; }
    .role-3 { background: #f3f3f3; color: #555; }

    /* 操作ボタン */
    .btn-edit, .btn-delete {
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-edit   { background: var(--navy-light); color: var(--white); margin-right: 6px; }
    .btn-delete { background: var(--red); color: var(--white); }

    .btn-edit:hover, .btn-delete:hover { opacity: 0.82; }

    /* ════════════════════════ PERMISSION MATRIX ══════════════════════════════════ */
    .matrix-section { margin-top: 12px; }

    .matrix-table { font-size: 0.8rem; }

    .matrix-table th { background: var(--navy); color: var(--white); text-align: center; }

    .matrix-table th:first-child { text-align: left; }

    .matrix-table td { text-align: center; }

    .matrix-table td:first-child { text-align: left; font-weight: 600; color: var(--navy); }

    .check-ok  { color: var(--green); font-size: 1rem; }
    .check-ng  { color: #ccc; font-size: 0.9rem; }

    /* ════════════════════════ MODAL ═════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(9,30,69,0.55);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal {
      background: var(--white);
      border-radius: 10px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(9,30,69,0.28);
      overflow: hidden;
    }

    .modal-header {
      background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      color: var(--white);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    .modal-close:hover { color: var(--white); }

    .modal-body { padding: 24px 20px 8px; }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--gray-border);
      border-radius: 5px;
      font-size: 0.9rem;
      color: var(--text-main);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--navy);
    }

    .form-group input:disabled {
      background: var(--gray-card);
      color: var(--text-sub);
      cursor: not-allowed;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--gray-border);
    }

    .btn-cancel {
      background: transparent;
      border: 1.5px solid var(--gray-border);
      border-radius: 5px;
      padding: 8px 20px;
      font-size: 0.85rem;
      color: var(--text-sub);
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: var(--gray-card); }

    .btn-save {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
      border: none;
      border-radius: 5px;
      padding: 8px 24px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--white);
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover { opacity: 0.88; }

    /* ════════════════════════ TOAST ══════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 12px 22px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--white);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 300;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { background: var(--green); }
    .toast.error   { background: var(--red); }

    /* ════════════════════════ FOOTER ════════════════════════════════════════════ */
    .site-footer {
      background: var(--navy-dark);
      color: rgba(255,255,255,0.45);
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 14px 16px;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M32 4L8 14v18c0 13.3 10.3 25.7 24 29 13.7-3.3 24-15.7 24-29V14L32 4z"
              fill="none" stroke="#FFD700" stroke-width="3" stroke-linejoin="round"/>
        <path d="M32 12L14 20v12c0 9 6.8 17.4 18 20.4C45.2 49.4 52 41 52 32V20L32 12z"
              fill="rgba(255,215,0,0.35)"/>
        <polyline points="22,32 29,39 43,25"
                  stroke="#FFD700" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="header-logo-text">
        <div class="company">AX損害保険株式会社</div>
        <div class="system">代理店Webシステム｜ユーザー管理</div>
      </div>
    </div>
    <div class="header-user">
      <a href="dashboard.html" class="header-back-link">ダッシュボードへ</a>
      <div class="user-badge">
        <span class="badge-agency" id="hdr-agency">--</span><span class="badge-login" id="hdr-name">--</span><span class="badge-role" id="hdr-role"></span>
      </div>
      <button class="btn-logout" id="btn-logout">ログアウト</button>
    </div>
  </header>
  <div class="gold-bar"></div>

  <!-- メインコンテンツ -->
  <div class="main-content">

    <!-- ユーザー一覧 -->
    <section>
      <div class="section-header">
        <div class="section-title">ユーザー一覧</div>
        <button class="btn-add" id="btn-add-user">＋ ユーザー追加</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ログインID</th>
                <th>氏名</th>
                <th>ロール</th>
                <th>有効フラグ</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="5" style="text-align:center;color:var(--text-sub);padding:24px">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ロール別権限一覧 -->
    <section class="matrix-section">
      <div class="section-header" style="margin-bottom:16px">
        <div class="section-title">ロール別権限一覧</div>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table class="matrix-table">
            <thead id="matrix-head">
              <tr><th>機能</th></tr>
            </thead>
            <tbody id="matrix-body">
              <tr><td colspan="10" style="text-align:center;color:var(--text-sub);padding:24px">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </div><!-- /main-content -->

  <footer class="site-footer">
    &copy; 2026 AX損害保険株式会社. All Rights Reserved.
  </footer>

  <!-- ユーザー追加・編集モーダル -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">ユーザー追加</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="form-user-id">
        <div class="form-group">
          <label>ログインID</label>
          <input type="text" id="form-login-id" placeholder="ログインIDを入力" maxlength="50">
        </div>
        <div class="form-group">
          <label id="pw-label">パスワード</label>
          <input type="password" id="form-password" placeholder="パスワードを入力" maxlength="128">
        </div>
        <div class="form-group">
          <label>ロール</label>
          <select id="form-role-id">
            <option value="1">管理者</option>
            <option value="2">一般担当</option>
            <option value="3">閲覧専用</option>
          </select>
        </div>
        <div class="form-group">
          <label>有効フラグ</label>
          <select id="form-is-active">
            <option value="1">有効</option>
            <option value="0">無効</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btn-cancel">キャンセル</button>
        <button class="btn-save" id="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';

    let token, agencyCode, loginId;

    // ── トースト通知 ──────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    // ── 共通fetchラッパー ─────────────────────────────────────
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
      });
      if (res.status === 401) {
        localStorage.clear();
        window.location.href = 'login.html';
      }
      return res;
    }

    // ── ユーザー一覧を描画する ────────────────────────────────
    async function loadUsers() {
      const res = await apiFetch('/api/users');
      if (!res.ok) { showToast('ユーザー一覧の取得に失敗しました', 'error'); return; }
      const { users } = await res.json();

      const tbody = document.getElementById('users-tbody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-sub);padding:24px">ユーザーが存在しません</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u => `
        <tr>
          <td style="font-weight:600">${escHtml(u.login_id)}</td>
          <td>${escHtml(u.name)}</td>
          <td><span class="role-chip role-${u.role_id}">${escHtml(u.role_name)}</span></td>
          <td>
            <span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">
              ${u.is_active ? '有効' : '無効'}
            </span>
          </td>
          <td>
            <button class="btn-edit" onclick="openEdit(${u.id}, '${escHtml(u.login_id)}', ${u.role_id}, ${u.is_active}, '${escHtml(u.name)}')">編集</button>
            <button class="btn-delete" onclick="deleteUser(${u.id}, '${escHtml(u.login_id)}')">削除</button>
          </td>
        </tr>
      `).join('');
    }

    // ── 権限マトリクスを描画する ──────────────────────────────
    async function loadMatrix() {
      const res = await apiFetch('/api/role-matrix');
      if (!res.ok) return;
      const { roles, features, permissions } = await res.json();

      // ヘッダー行
      const thead = document.getElementById('matrix-head');
      thead.innerHTML = '<tr><th>機能</th>' +
        roles.map(r => `<th>${escHtml(r.role_name)}</th>`).join('') + '</tr>';

      // データ行
      const tbody = document.getElementById('matrix-body');
      tbody.innerHTML = features.map(f => {
        const cells = roles.map(r => {
          const has = (permissions[r.role_id] || []).includes(f.feature_code);
          return `<td>${has
            ? '<span class="check-ok">✓</span>'
            : '<span class="check-ng">—</span>'
          }</td>`;
        }).join('');
        return `<tr><td>${escHtml(f.feature_name)}</td>${cells}</tr>`;
      }).join('');
    }

    // ── モーダルを開く（追加） ────────────────────────────────
    function openAdd() {
      document.getElementById('modal-title').textContent  = 'ユーザー追加';
      document.getElementById('form-user-id').value       = '';
      document.getElementById('form-login-id').value      = '';
      document.getElementById('form-login-id').disabled   = false;
      document.getElementById('form-password').value      = '';
      document.getElementById('form-role-id').value       = '2';
      document.getElementById('form-is-active').value     = '1';
      document.getElementById('pw-label').textContent     = 'パスワード';
      document.getElementById('modal-overlay').style.display = 'flex';
      document.getElementById('form-login-id').focus();
    }

    // ── モーダルを開く（編集） ────────────────────────────────
    function openEdit(id, loginId, roleId, isActive, name) {
      document.getElementById('modal-title').textContent  = 'ユーザー編集';
      document.getElementById('form-user-id').value       = id;
      document.getElementById('form-login-id').value      = loginId;
      document.getElementById('form-login-id').disabled   = true;
      document.getElementById('form-password').value      = '';
      document.getElementById('form-role-id').value       = roleId;
      document.getElementById('form-is-active').value     = isActive;
      document.getElementById('pw-label').textContent     = 'パスワード（変更する場合のみ入力）';
      document.getElementById('modal-overlay').style.display = 'flex';
    }

    // ── モーダルを閉じる ──────────────────────────────────────
    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    // ── 保存処理 ──────────────────────────────────────────────
    async function saveUser() {
      const userId   = document.getElementById('form-user-id').value;
      const loginId  = document.getElementById('form-login-id').value.trim();
      const password = document.getElementById('form-password').value;
      const roleId   = parseInt(document.getElementById('form-role-id').value);
      const isActive = parseInt(document.getElementById('form-is-active').value);

      const isNew = !userId;

      if (isNew) {
        if (!loginId) { showToast('ログインIDを入力してください', 'error'); return; }
        if (!password) { showToast('パスワードを入力してください', 'error'); return; }

        const body = { login_id: loginId, password, role_id: roleId, name: loginId, is_active: isActive };
        const res = await apiFetch('/api/users', { method: 'POST', body: JSON.stringify(body) });
        if (res.ok) {
          showToast('ユーザーを登録しました');
          closeModal();
          loadUsers();
        } else {
          const err = await res.json();
          showToast(err.detail || '登録に失敗しました', 'error');
        }
      } else {
        const body = { role_id: roleId, is_active: isActive };
        if (password) body.password = password;

        const res = await apiFetch(`/api/users/${userId}`, { method: 'PUT', body: JSON.stringify(body) });
        if (res.ok) {
          showToast('ユーザー情報を更新しました');
          closeModal();
          loadUsers();
        } else {
          const err = await res.json();
          showToast(err.detail || '更新に失敗しました', 'error');
        }
      }
    }

    // ── 削除処理（論理削除） ──────────────────────────────────
    async function deleteUser(userId, loginId) {
      if (!confirm(`「${loginId}」を無効化します。よろしいですか？`)) return;

      const res = await apiFetch(`/api/users/${userId}`, { method: 'DELETE' });
      if (res.ok) {
        showToast('ユーザーを無効化しました');
        loadUsers();
      } else {
        const err = await res.json();
        showToast(err.detail || '削除に失敗しました', 'error');
      }
    }

    // ── HTMLエスケープ ────────────────────────────────────────
    function escHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // ── 初期化 ────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      token      = localStorage.getItem('token');
      agencyCode = localStorage.getItem('agency_code');
      loginId    = localStorage.getItem('login_id');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      // 権限チェック：管理者以外はダッシュボードにリダイレクト
      const permRes = await fetch(`${API_BASE}/api/permissions`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!permRes.ok) {
        window.location.href = 'login.html';
        return;
      }

      const permData = await permRes.json();
      if (permData.role_id !== 1) {
        window.location.href = 'dashboard.html';
        return;
      }

      // ヘッダー表示
      document.getElementById('hdr-agency').textContent = (agencyCode || '') + ' ';
      document.getElementById('hdr-name').textContent   = loginId || '';
      document.getElementById('hdr-role').textContent   = '｜' + permData.role_name;

      // ログアウト
      document.getElementById('btn-logout').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = 'login.html';
      });

      // モーダルイベント
      document.getElementById('btn-add-user').addEventListener('click', openAdd);
      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('btn-cancel').addEventListener('click', closeModal);
      document.getElementById('btn-save').addEventListener('click', saveUser);

      // オーバーレイクリックで閉じる
      document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
      });

      // データ読み込み
      await Promise.all([loadUsers(), loadMatrix()]);
    });
  </script>

</body>
</html>
