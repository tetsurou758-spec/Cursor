<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー管理｜AX損害保険株式会社</title>
  <link rel="stylesheet" href="js/theme.css">
  <script src="js/session.js"></script>
  <script>applyTheme()</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:   #ffffff;
      --red:     #c0392b;
      --red-bg:  #fdf0f0;
      --green:   #1e7e34;
      --green-bg:#d4edda;
    }

    body {
      background: var(--gray-bg);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: var(--text-main);
      min-width: 320px;
    }

    /* ════════════════════════ HEADER ════════════════════════════════════════════ */
    .site-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px var(--primary-shadow);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--white);
      text-decoration: none;
    }

    .header-logo svg { width: 28px; height: 28px; flex-shrink: 0; }

    .header-logo-text { line-height: 1.2; }

    .header-logo-text .company { font-size: 1.02rem; font-weight: 700; letter-spacing: 0.08em; color: #FFD700; }



    .header-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-back-link {
      color: var(--accent-light);
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--accent-border);
      border-radius: 4px;
      padding: 4px 10px;
      letter-spacing: 0.04em;
      transition: background 0.2s;
    }

    .header-back-link:hover { background: rgba(201,168,76,0.15); color: #FFD700; }

    .user-badge {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--accent-border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
    }

    .user-badge .badge-agency { color: var(--accent-light); font-weight: 700; margin-right: 2px; }
    .user-badge .badge-login  { color: #fff; font-weight: 400; }
    .user-badge .badge-role   { color: var(--accent-light); font-weight: 600; margin-left: 2px; }

    .btn-logout {
      background: transparent;
      border: 1.5px solid var(--accent-border-btn);
      color: var(--accent-light);
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      letter-spacing: 0.06em;
    }

    .btn-logout:hover { background: var(--accent); color: var(--primary-dark); border-color: var(--accent); }

    .gold-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--primary-dark) 0%, var(--accent) 50%, var(--primary-dark) 100%);
    }

    /* ════════════════════════ MAIN ══════════════════════════════════════════════ */
    .main-content { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: var(--detail-label-color);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ════════════════════════ SECTION HEADER ════════════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .btn-add {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: var(--white);
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 2px 8px var(--card-shadow);
    }

    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ════════════════════════ TABLE ═════════════════════════════════════════════ */
    .card {
      background: var(--white);
      border-radius: 10px;
      box-shadow: 0 2px 12px var(--card-shadow);
      overflow: hidden;
      margin-bottom: 32px;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead { background: var(--primary); color: var(--white); }

    thead th {
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      letter-spacing: 0.04em;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    tbody tr { border-bottom: 1px solid var(--gray-border); }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: var(--gray-card); }

    tbody td {
      padding: 12px 16px;
      vertical-align: middle;
    }

    /* ステータスバッジ */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .badge-active   { background: var(--green-bg); color: var(--green); }
    .badge-inactive { background: #f8d7da; color: #721c24; }

    .role-chip {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .role-1 { background: #e8edf8; color: var(--primary); }
    .role-2 { background: #fff8e6; color: #8a6820; }
    .role-3 { background: #f3f3f3; color: #555; }

    /* 操作ボタン */
    .btn-edit, .btn-delete {
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-edit   { background: var(--primary-light); color: var(--white); margin-right: 6px; }
    .btn-delete { background: var(--red); color: var(--white); }

    .btn-edit:hover, .btn-delete:hover { opacity: 0.82; }

    /* ════════════════════════ PERMISSION MATRIX ══════════════════════════════════ */
    .matrix-section { margin-top: 12px; }

    .matrix-table { font-size: 0.8rem; }

    .matrix-table th { background: var(--primary); color: var(--white); text-align: center; }

    .matrix-table th:first-child { text-align: left; }

    .matrix-table td { text-align: center; }

    .matrix-table td:first-child { text-align: left; font-weight: 600; color: var(--primary); }

    .check-ok  { color: var(--green); font-size: 1rem; }
    .check-ng  { color: #ccc; font-size: 0.9rem; }

    /* ════════════════════════ MODAL ═════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(9,30,69,0.55);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal {
      background: var(--white);
      border-radius: 10px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px var(--primary-shadow);
      overflow: hidden;
    }

    .modal-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      color: var(--white);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .modal-close {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
    }

    .modal-close:hover { color: var(--white); }

    .modal-body { padding: 24px 20px 8px; }

    .form-group { margin-bottom: 18px; }

    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 6px;
      letter-spacing: 0.04em;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--gray-border);
      border-radius: 5px;
      font-size: 0.9rem;
      color: var(--text-main);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--primary);
    }

    .form-group input:disabled {
      background: var(--gray-card);
      color: var(--text-sub);
      cursor: not-allowed;
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 20px 20px;
      border-top: 1px solid var(--gray-border);
    }

    .btn-cancel {
      background: transparent;
      border: 1.5px solid var(--gray-border);
      border-radius: 5px;
      padding: 8px 20px;
      font-size: 0.85rem;
      color: var(--text-sub);
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover { background: var(--gray-card); }

    .btn-save {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border: none;
      border-radius: 5px;
      padding: 8px 24px;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--white);
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover { opacity: 0.88; }

    /* ════════════════════════ TOAST ══════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 12px 22px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--white);
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 300;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { background: var(--green); }
    .toast.error   { background: var(--red); }

    /* ════════════════════════ USER-TYPE BADGE ═══════════════════════════════════ */
    .utype-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* 代理店：紺色テーマ */
    .utype-agency {
      background: rgba(13, 43, 94, 0.1);
      color: #0D2B5E;
      border: 1px solid rgba(13, 43, 94, 0.35);
    }

    /* 社員：ピンクテーマ */
    .utype-staff {
      background: rgba(255, 20, 147, 0.08);
      color: #CC0077;
      border: 1px solid rgba(204, 0, 119, 0.35);
    }

    /* ════════════════════════ FOOTER ════════════════════════════════════════════ */
    .site-footer {
      background: var(--primary-dark);
      color: rgba(255,255,255,0.45);
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      padding: 14px 16px;
    }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M32 4L8 14v18c0 13.3 10.3 25.7 24 29 13.7-3.3 24-15.7 24-29V14L32 4z"
              fill="none" stroke="var(--accent)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M32 12L14 20v12c0 9 6.8 17.4 18 20.4C45.2 49.4 52 41 52 32V20L32 12z"
              fill="rgba(255,255,255,0.15)"/>
        <polyline points="22,32 29,39 43,25"
                  stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

        <div class="company">AX損害保険株式会社</div>

    <span class="header-center-title">権限管理</span>

  <div class="gold-bar"></div>

  <!-- メインコンテンツ -->
  <div class="main-content">

    <!-- 社員専用：代理店マスタ編集ボタン -->
    <div id="staff-tools-bar" style="display:none; text-align:right; margin-bottom:18px;">
      <a href="agency_master.html" style="
        display:inline-flex; align-items:center; gap:7px;
        background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 100%);
        color:#FFD700; border:1.5px solid rgba(201,168,76,0.45);
        border-radius:6px; padding:8px 18px; font-size:0.82rem; font-weight:700;
        text-decoration:none; letter-spacing:0.04em;

      " onmouseover="this.style.opacity='0.85';this.style.transform='translateY(-1px)'"
         onmouseout="this.style.opacity='1';this.style.transform='none'">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
        </svg>
        代理店マスタ編集
      </a>
    </div>

    <!-- ユーザー一覧 -->
    <section>
      <div class="section-header">
        <div class="section-title">ユーザー一覧</div>
        <button class="btn-add" id="btn-add-user">＋ ユーザー追加</button>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ユーザー種別</th>
                <th>ログインID</th>
                <th>氏名</th>
                <th>ロール</th>
                <th>有効フラグ</th>

              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="6" style="text-align:center;color:var(--text-sub);padding:24px">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ロール別権限一覧 -->
    <section class="matrix-section">
      <div class="section-header" style="margin-bottom:16px">
        <div class="section-title">ロール別権限一覧</div>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table class="matrix-table">
            <thead id="matrix-head">
              <tr><th>機能</th></tr>
            </thead>
            <tbody id="matrix-body">
              <tr><td colspan="10" style="text-align:center;color:var(--text-sub);padding:24px">読み込み中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </div><!-- /main-content -->

  <footer class="site-footer">
    &copy; 2026 AX損害保険株式会社. All Rights Reserved.
  </footer>

  <!-- ユーザー追加・編集モーダル -->
  <div class="modal-overlay" id="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">ユーザー追加</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="form-user-id">
        <input type="hidden" id="form-record-usertype" value="staff">
        <!-- 新規追加時のユーザー種別選択（社員管理者のみ表示） -->
        <div class="form-group" id="form-newtype-group" style="display:none">
          <label>ユーザー種別</label>
          <select id="form-new-usertype">
            <option value="staff">社員</option>
            <option value="agency">代理店</option>
          </select>
        </div>
        <!-- 代理店ユーザー追加時の代理店コード入力（社員管理者のみ） -->
        <div class="form-group" id="form-agencycode-group" style="display:none">
          <label>代理店コード</label>
          <input type="text" id="form-agency-code" placeholder="例）A001" maxlength="20">
        </div>
        <div class="form-group" id="form-login-id-group">
          <label id="form-login-id-label">ログインID</label>
          <input type="text" id="form-login-id" placeholder="ログインIDを入力" maxlength="50">
        </div>
        <div class="form-group" id="form-name-group" style="display:none">
          <label>氏名</label>
          <input type="text" id="form-name" placeholder="氏名を入力" maxlength="100">
        </div>
        <div class="form-group" id="form-password-group">
          <label id="pw-label">パスワード</label>
          <input type="password" id="form-password" placeholder="パスワードを入力" maxlength="128">
        </div>
        <div class="form-group">
          <label>ロール</label>
          <select id="form-role-id">
            <option value="1">管理者</option>
            <option value="2">一般担当</option>
            <option value="3">閲覧専用</option>
          </select>
        </div>
        <div class="form-group">
          <label>有効フラグ</label>
          <select id="form-is-active">
            <option value="1">有効</option>
            <option value="0">無効</option>
          </select>

      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';

    let token, userType, headerCode, headerName;
    let editingUserType = 'staff'; // 編集中レコードのuser_type（保存先テーブル判定に使用）

    const AGENCY_ROLE_OPTS =
      '<option value="1">管理者</option>' +
      '<option value="2">一般担当</option>' +
      '<option value="3">閲覧専用</option>';
    const STAFF_ROLE_OPTS =
      '<option value="1">システム管理者</option>' +
      '<option value="2">代理店担当者</option>' +
      '<option value="3">参照専用社員</option>';

    // ── トースト通知 ──────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3000);
    }

    // ── 共通fetchラッパー ─────────────────────────────────────
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json',
          ...(options.headers || {}),
        },
      });
      if (res.status === 401) {
        sessionStorage.clear(); localStorage.clear();
        window.location.href = getLoginUrl();
      }
      return res;
    }

    // ── ユーザー一覧を描画する ────────────────────────────────
    async function loadUsers() {
      const endpoint = userType === 'staff' ? '/api/staff/users' : '/api/users';
      const res = await apiFetch(endpoint);
      if (!res.ok) { showToast('ユーザー一覧の取得に失敗しました', 'error'); return; }
      const { users } = await res.json();

      const tbody = document.getElementById('users-tbody');
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-sub);padding:24px">ユーザーが存在しません</td></tr>';
        return;
      }

      // 代理店管理者は削除ボタン非表示（ロール設定のみ可）
      const showDelete = (userType === 'staff');

      tbody.innerHTML = users.map(u => {
        // user_type未設定時: 代理店管理者画面は全件代理店ユーザー、社員管理者画面はAPIが明示的に返す
        const ut = u.user_type || (userType === 'staff' ? 'staff' : 'agency');
        const utLabel = ut === 'agency' ? '代理店' : '社員';
        const utClass = ut === 'agency' ? 'utype-agency' : 'utype-staff';
        // 代理店ユーザーの場合は代理店コードをログインIDに併記
        const loginIdDisplay = (ut === 'agency' && u.agency_code)
          ? `<span style="color:var(--text-sub);font-size:0.72rem">[${escHtml(u.agency_code)}]</span> ${escHtml(u.login_id)}`
          : escHtml(u.login_id);
        return `
        <tr>
          <td><span class="utype-badge ${utClass}">${utLabel}</span></td>
          <td style="font-weight:600">${loginIdDisplay}</td>
          <td>${escHtml(u.name)}</td>
          <td><span class="role-chip role-${u.role_id}">${escHtml(u.role_name)}</span></td>
          <td>
            <span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">
              ${u.is_active ? '有効' : '無効'}
            </span>
          </td>
          <td>
            <button class="btn-edit" onclick="openEdit(${u.id}, '${escHtml(u.login_id)}', ${u.role_id}, ${u.is_active}, '${escHtml(u.name)}', '${ut}')">編集</button>
            ${showDelete ? `<button class="btn-delete" onclick="deleteUser(${u.id}, '${escHtml(u.login_id)}', '${ut}')">削除</button>` : ''}
          </td>
        </tr>`;
      }).join('');
    }

    // ── 権限マトリクスを描画する ──────────────────────────────
    async function loadMatrix() {
      const endpoint = userType === 'staff' ? '/api/staff/role-matrix' : '/api/role-matrix';
      const res = await apiFetch(endpoint);
      if (!res.ok) return;
      const { roles, features, permissions } = await res.json();

      // ヘッダー行
      const thead = document.getElementById('matrix-head');
      thead.innerHTML = '<tr><th>機能</th>' +
        roles.map(r => `<th>${escHtml(r.role_name)}</th>`).join('') + '</tr>';

      // データ行
      const tbody = document.getElementById('matrix-body');
      tbody.innerHTML = features.map(f => {
        // 代理店ビューではAGENCY_MASTERを「社員専用」として特別表示
        if (userType !== 'staff' && f.feature_code === 'AGENCY_MASTER') {
          const colspan = roles.length;
          return `<tr style="opacity:0.55;">
            <td>${escHtml(f.feature_name)}</td>
            <td colspan="${colspan}" style="text-align:center;font-size:0.78rem;color:#94a3b8;font-style:italic;">
              社員専用機能（代理店には非表示）
            </td>
          </tr>`;
        }
        const cells = roles.map(r => {
          const has = (permissions[r.role_id] || []).includes(f.feature_code);
          return `<td>${has
            ? '<span class="check-ok">✓</span>'
            : '<span class="check-ng">—</span>'
          }</td>`;
        }).join('');
        return `<tr><td>${escHtml(f.feature_name)}</td>${cells}</tr>`;
      }).join('');
    }

    // ── モーダルを開く（追加） ────────────────────────────────
    function onNewUserTypeChange() {
      const val = document.getElementById('form-new-usertype').value;
      const isAgency = (val === 'agency');
      document.getElementById('form-agencycode-group').style.display = isAgency ? '' : 'none';
      document.getElementById('form-name-group').style.display       = isAgency ? 'none' : '';
      document.getElementById('form-password-group').style.display   = '';
      document.getElementById('form-login-id-label').textContent     = isAgency ? 'ログインID' : '社員番号';
      document.getElementById('form-role-id').innerHTML              = isAgency ? AGENCY_ROLE_OPTS : STAFF_ROLE_OPTS;
    }

    function openAdd() {
      document.getElementById('modal-title').textContent  = 'ユーザー追加';
      document.getElementById('form-user-id').value       = '';
      document.getElementById('form-record-usertype').value = 'new';
      document.getElementById('form-login-id').value      = '';
      document.getElementById('form-login-id').disabled   = false;
      document.getElementById('form-name').value          = '';
      document.getElementById('form-password').value      = '';
      document.getElementById('form-agency-code').value   = '';
      document.getElementById('form-role-id').value       = '2';
      document.getElementById('form-is-active').value     = '1';
      document.getElementById('pw-label').textContent     = 'パスワード';
      // 社員管理者：種別セレクトを社員にリセットして表示
      document.getElementById('form-new-usertype').value  = 'staff';
      document.getElementById('form-newtype-group').style.display = '';
      document.getElementById('form-agencycode-group').style.display = 'none';
      document.getElementById('form-name-group').style.display = '';
      document.getElementById('form-password-group').style.display = '';
      document.getElementById('form-login-id-label').textContent = '社員番号';
      document.getElementById('form-role-id').innerHTML = STAFF_ROLE_OPTS;
      document.getElementById('modal-overlay').style.display = 'flex';
      document.getElementById('form-login-id').focus();
    }

    // ── モーダルを開く（編集） ────────────────────────────────
    function openEdit(id, loginId, roleId, isActive, name, recordUserType) {
      recordUserType = recordUserType || (userType === 'staff' ? 'staff' : 'agency');
      editingUserType = recordUserType; // 保存先テーブル判定用グローバル変数に保持

      document.getElementById('modal-title').textContent      = 'ユーザー編集';
      document.getElementById('form-user-id').value           = id;
      document.getElementById('form-record-usertype').value   = recordUserType;
      document.getElementById('form-login-id').value          = loginId;
      document.getElementById('form-name').value              = name || '';
      document.getElementById('form-password').value          = '';
      document.getElementById('form-role-id').value           = roleId;
      document.getElementById('form-is-active').value         = isActive;
      document.getElementById('pw-label').textContent         = 'パスワード（変更する場合のみ入力）';

      // 新規追加用セレクト・代理店コード欄は編集時は非表示
      document.getElementById('form-newtype-group').style.display    = 'none';
      document.getElementById('form-agencycode-group').style.display = 'none';

      if (recordUserType === 'agency') {
        // 代理店ユーザー編集：ログインID・パスワード・氏名は変更不可、ロールのみ
        document.getElementById('form-login-id').disabled           = true;
        document.getElementById('form-login-id-label').textContent  = 'ログインID';
        document.getElementById('form-password-group').style.display = 'none';
        document.getElementById('form-name-group').style.display    = 'none';
        document.getElementById('form-role-id').innerHTML           = AGENCY_ROLE_OPTS;
      } else {
        // 社員ユーザー編集：社員管理者は社員番号も変更可
        document.getElementById('form-login-id').disabled           = (userType !== 'staff');
        document.getElementById('form-login-id-label').textContent  = '社員番号';
        document.getElementById('form-password-group').style.display = '';
        document.getElementById('form-name-group').style.display    = '';
        document.getElementById('form-role-id').innerHTML           = STAFF_ROLE_OPTS;
      }

      document.getElementById('modal-overlay').style.display = 'flex';
    }

    // ── モーダルを閉じる ──────────────────────────────────────
    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
    }

    // ── 保存処理 ──────────────────────────────────────────────
    async function saveUser() {
      const userId   = document.getElementById('form-user-id').value;
      const loginIdV = document.getElementById('form-login-id').value.trim();
      const nameV    = document.getElementById('form-name').value.trim();
      const password = document.getElementById('form-password').value;
      const roleId   = parseInt(document.getElementById('form-role-id').value);
      const isActive = parseInt(document.getElementById('form-is-active').value);
      const isNew         = !userId;
      const recordUType   = document.getElementById('form-record-usertype').value;

      if (userType === 'staff') {
        // ── 社員管理者として操作 ──────────────────────────────
        if (isNew) {
          // 新規追加：種別セレクトで社員/代理店を判定
          const newUType = document.getElementById('form-new-usertype').value;
          if (newUType === 'agency') {
            // 代理店ユーザー追加
            const agencyCodeV = document.getElementById('form-agency-code').value.trim();
            if (!agencyCodeV) { showToast('代理店コードを入力してください', 'error'); return; }
            if (!loginIdV)    { showToast('ログインIDを入力してください', 'error'); return; }
            if (!password)    { showToast('パスワードを入力してください', 'error'); return; }
            const body = { login_id: loginIdV, name: loginIdV, password, role_id: roleId, is_active: isActive };
            const url  = `/api/staff/agency-users?agency_code=${encodeURIComponent(agencyCodeV)}`;
            const res  = await apiFetch(url, { method: 'POST', body: JSON.stringify(body) });
            if (res.ok) { showToast('代理店ユーザーを登録しました'); closeModal(); loadUsers(); }
            else { showToast((await res.json()).detail || '登録に失敗しました', 'error'); }
          } else {
            // 社員ユーザー追加
            if (!loginIdV) { showToast('社員番号を入力してください', 'error'); return; }
            if (!nameV)    { showToast('氏名を入力してください', 'error'); return; }
            if (!password) { showToast('パスワードを入力してください', 'error'); return; }
            const body = { staff_code: loginIdV, name: nameV, password, role_id: roleId, is_active: isActive };
            const res  = await apiFetch('/api/staff/users', { method: 'POST', body: JSON.stringify(body) });
            if (res.ok) { showToast('社員ユーザーを登録しました'); closeModal(); loadUsers(); }
            else { showToast((await res.json()).detail || '登録に失敗しました', 'error'); }
          }
        } else if (recordUType === 'agency') {
          // 代理店ユーザー編集（社員管理者から）：ロール・有効フラグのみ
          const body = { role_id: roleId, is_active: isActive };
          const res = await apiFetch(`/api/staff/agency-users/${userId}`, { method: 'PUT', body: JSON.stringify(body) });
          if (res.ok) { showToast('代理店ユーザーのロールを更新しました'); closeModal(); loadUsers(); }
          else { showToast((await res.json()).detail || '更新に失敗しました', 'error'); }
        } else {
          // 社員ユーザー編集：社員番号・氏名・パスワード・ロール更新可
          const body = { role_id: roleId, is_active: isActive };
          if (loginIdV) body.staff_code = loginIdV;
          if (nameV)    body.name       = nameV;
          if (password) body.password   = password;
          const res = await apiFetch(`/api/staff/users/${userId}`, { method: 'PUT', body: JSON.stringify(body) });
          if (res.ok) { showToast('社員ユーザー情報を更新しました'); closeModal(); loadUsers(); }
          else { showToast((await res.json()).detail || '更新に失敗しました', 'error'); }
        }
      } else {
        // ── 代理店管理者：ロール・有効フラグのみ更新可 ─────────
        if (isNew) { showToast('代理店管理者はユーザー追加できません', 'error'); return; }
        const body = { role_id: roleId, is_active: isActive };
        const res = await apiFetch(`/api/users/${userId}`, { method: 'PUT', body: JSON.stringify(body) });
        if (res.ok) { showToast('ロールを更新しました'); closeModal(); loadUsers(); }
        else { showToast((await res.json()).detail || '更新に失敗しました', 'error'); }
      }
    }

    // ── 削除処理（論理削除） ──────────────────────────────────
    async function deleteUser(userId, loginId, recordUserType) {
      if (!confirm(`「${loginId}」を無効化します。よろしいですか？`)) return;
      let endpoint;
      if (userType === 'staff') {
        // 社員管理者：レコードのuser_typeで対象テーブルを判定
        endpoint = (recordUserType === 'agency')
          ? `/api/staff/agency-users/${userId}`
          : `/api/staff/users/${userId}`;
      } else {
        endpoint = `/api/users/${userId}`;
      }
      const res = await apiFetch(endpoint, { method: 'DELETE' });
      if (res.ok) { showToast('ユーザーを無効化しました'); loadUsers(); }
      else { showToast((await res.json()).detail || '削除に失敗しました', 'error'); }
    }

    // ── HTMLエスケープ ────────────────────────────────────────
    function escHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // ── 初期化 ────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      token    = requireAuth();
      if (!token) return;
      userType = _ssGet('user_type') || 'agency';

      if (userType === 'staff') {
        headerCode = _ssGet('staff_code');
        headerName = _ssGet('staff_name');
      } else {
        headerCode = _ssGet('agency_code');
        headerName = _ssGet('login_id');
      }

      // 権限チェック：管理者以外はダッシュボードにリダイレクト
      const permRes = await fetch(`${API_BASE}/api/permissions`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });

      if (!permRes.ok) {
        window.location.href = getLoginUrl();
        return;
      }

      const permData = await permRes.json();
      if (permData.role_id !== 1) {
        window.location.href = 'dashboard.html';
        return;
      }

      // ヘッダー表示
      applyUserBadge('user-badge');

      // ユーザー種別ごとのUI差分
      if (userType === 'staff') {
        // system テキストは header-center-title に移行したため削除済み
        document.getElementById('staff-tools-bar').style.display = '';
        document.getElementById('form-login-id-label').textContent = '社員番号';
        document.getElementById('form-name-group').style.display   = '';
        // ロール選択肢を社員ロールに差し替え
        document.getElementById('form-role-id').innerHTML =
          '<option value="1">システム管理者</option>' +
          '<option value="2">代理店担当者</option>' +
          '<option value="3">参照専用社員</option>';
      } else {
        // 代理店管理者：ロール設定のみ（追加・パスワード・氏名は非表示）
        document.getElementById('btn-add-user').style.display       = 'none';
        document.getElementById('form-password-group').style.display = 'none';
        document.getElementById('form-name-group').style.display    = 'none';
      }

      // ログアウト
      document.getElementById('btn-logout').addEventListener('click', doLogout);

      // モーダルイベント
      document.getElementById('btn-add-user').addEventListener('click', openAdd);
      document.getElementById('modal-close').addEventListener('click', closeModal);
      document.getElementById('btn-cancel').addEventListener('click', closeModal);
      document.getElementById('btn-save').addEventListener('click', saveUser);
      document.getElementById('form-new-usertype').addEventListener('change', onNewUserTypeChange);

      // オーバーレイクリックで閉じる
      document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
      });

      // データ読み込み
      await Promise.all([loadUsers(), loadMatrix()]);
    });
  </script>
