<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顧客管理システム｜AX損害保険</title>
  <link rel="stylesheet" href="js/theme.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: var(--gray-bg); color: #333; min-height: 100vh; }

    /* ── ヘッダー ── */
    .site-header { background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; box-shadow: 0 2px 12px var(--primary-shadow); position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 16px; }
    /* ロゴ：他画面と統一（SVGベース） */
    .header-logo { display: flex; align-items: center; gap: 10px; color: #fff; text-decoration: none; }
    .header-logo svg { width: 28px; height: 28px; flex-shrink: 0; }
    .header-logo-text { line-height: 1.2; }
    .header-logo-text .company { font-size: 1.02rem; font-weight: 700; letter-spacing: 0.08em; color: #fff; }
    .header-title { display: none; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-user { font-size: 13px; color: rgba(255,255,255,.85); }
    .btn-logout { background: transparent; border: 1.5px solid var(--accent-border-btn); color: var(--accent-light); padding: 5px 14px; border-radius: 4px; cursor: pointer; font-size: 0.78rem; font-weight: 600; }
    .btn-logout:hover { background: rgba(255,255,255,.12); }

    /* ── 説明バナー ── */
    .info-banner { background: #fffbe6; border-left: 4px solid #f59e0b; padding: 10px 20px; margin: 16px 24px 0; border-radius: 4px; font-size: 13px; color: #6b4800; }
    .info-banner strong { color: #b45309; }

    /* ── メインコンテンツ ── */
    .main { padding: 16px 24px 40px; }

    /* ── 検索バー ── */
    .search-card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 16px 20px; margin-bottom: 16px; }
    .search-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 12px; }
    .search-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
    .search-group { display: flex; flex-direction: column; gap: 4px; }
    .search-group label { font-size: 11px; color: var(--label-color); font-weight: 700; }
    .search-group input, .search-group select {
      height: 34px; padding: 0 10px; border: 1px solid #d1d5db; border-radius: 5px;
      font-size: 13px; min-width: 120px; outline: none;
      transition: border-color .2s;
    }
    .search-group input:focus, .search-group select:focus { border-color: var(--primary); }
    .staff-only { display: none; }

    /* ── 未加入種目チェックボックス ── */
    .not-insured-group { display: flex; flex-direction: column; gap: 4px; }
    .not-insured-label-title { font-size: 11px; color: var(--label-color); font-weight: 700; }
    .not-insured-checks { display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: center; padding: 4px 0; }
    .not-insured-checks label {
      display: flex; align-items: center; gap: 3px;
      font-size: 12px; color: #374151; cursor: pointer; white-space: nowrap;
    }
    .not-insured-checks input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: var(--primary); }

    .btn-search {
      height: 34px; padding: 0 20px; background: var(--primary); color: #fff;
      border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 700;
      white-space: nowrap;
    }
    .btn-search:hover { background: var(--primary-dark); }
    .btn-reset {
      height: 34px; padding: 0 14px; background: #f3f4f6; color: #555;
      border: 1px solid #d1d5db; border-radius: 5px; cursor: pointer; font-size: 13px;
    }
    .btn-reset:hover { background: #e5e7eb; }

    /* ── 帳票出力ボタン ── */
    .btn-report-export {
      height: 34px; padding: 0 14px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff; border: none; border-radius: 5px; cursor: pointer;
      font-size: 13px; font-weight: 700; display: inline-flex; align-items: center; gap: 5px;
      transition: opacity 0.2s;
    }
    .btn-report-export:hover { opacity: 0.85; }

    /* ── トースト通知 ── */
    .toast-notify {
      position: fixed; bottom: 24px; right: 24px; z-index: 9000;
      background: var(--primary-dark); color: #fff;
      padding: 12px 20px; border-radius: 8px;
      font-size: 0.85rem; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
      max-width: 400px; line-height: 1.5;
    }
    .toast-notify.show { opacity: 1; transform: translateY(0); }

    /* ── 件数バー ── */
    .result-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .result-count { font-size: 13px; color: #555; }
    .result-count span { font-weight: 700; color: var(--primary); font-size: 16px; }

    /* ── 名寄せチェックボタン ── */
    .btn-meiyose {
      height: 34px; padding: 0 16px; background: var(--accent); color: var(--primary-dark);
      border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 700;
    }
    .btn-meiyose:hover { opacity: .85; }

    /* ── テーブル ── */
    .table-wrap { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: auto; max-height: calc(100vh - 280px); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 900px; }
    thead th {
      background: var(--primary); color: #fff; padding: 10px 8px;
      text-align: left; white-space: nowrap; position: sticky; top: 0; z-index: 1;
    }
    thead th.center { text-align: center; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .15s; }
    tbody tr:hover { background: var(--highlight-row); }
    tbody tr.detail-row { background: #fafafa; border-bottom: 2px solid var(--gray-border); }
    td { padding: 9px 8px; vertical-align: middle; }
    td.center { text-align: center; }

    /* ── 展開ボタン ── */
    .toggle-btn {
      width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--primary);
      background: transparent; color: var(--primary); cursor: pointer;
      font-size: 14px; font-weight: 700; line-height: 1;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .toggle-btn:hover { background: var(--primary); color: #fff; }

    /* ── 複数代理店アイコン ── */
    .multi-icon { color: var(--accent); font-size: 15px; }

    /* ── コンタクト履歴リンク ── */
    .contact-link { color: var(--primary); text-decoration: none; font-size: 12px; white-space: nowrap; }
    .contact-link:hover { text-decoration: underline; }
    .contact-none { color: #9ca3af; font-size: 12px; text-decoration: none; white-space: nowrap; }
    .contact-none:hover { color: var(--primary); text-decoration: underline; }

    /* ── 保険加入状況（7列固定）── */
    .ps-th { width: 40px; text-align: center; font-size: 11px; font-weight: bold; }
    .ps-td { width: 40px; text-align: center; padding: 6px 0; }
    .ps-label { display: block; font-size: 11px; color: #475569; font-weight: bold; line-height: 1.2; }
    .ps-val   { display: block; font-size: 14px; font-weight: 700; line-height: 1.3; }
    .ps-val.held { color: var(--held-color); }
    .ps-val.none { color: #CBD5E1; }

    /* ── 電話番号マスク ── */
    .tel-masked { color: #666; }

    /* ── 代理店バッジ ── */
    .agency-badge {
      display: inline-block; padding: 1px 6px; border-radius: 10px;
      font-size: 10px; font-weight: 700; margin: 1px;
      background: var(--primary); color: #fff;
    }

    /* ── 詳細展開行 ── */
    .detail-cell { padding: 12px 16px 14px 40px; }
    .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px 24px; margin-bottom: 12px; }
    .detail-item { font-size: 12px; }
    .detail-label { color: var(--detail-label-color); font-size: 12px; font-weight: bold; border-bottom: 1px solid var(--gray-border); padding-bottom: 3px; margin-bottom: 4px; }
    .detail-value { font-weight: 600; color: #333; }
    .contract-list { margin-top: 10px; }
    .contract-list-title { font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
    .contract-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .contract-table th { background: var(--gray-bg); padding: 5px 8px; text-align: left; color: #555; font-weight: 600; border-bottom: 1px solid var(--gray-border); }
    .contract-table td { padding: 5px 8px; border-bottom: 1px solid #f5f5f5; }
    .contract-table tr:last-child td { border-bottom: none; }

    /* ── ローディング ── */
    .loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }
    .empty { text-align: center; padding: 40px; color: #bbb; font-size: 14px; }

    /* ── リスクマップボタン ── */
    .btn-customer-riskmap {
      background: linear-gradient(135deg, #4A90D9 0%, #2563b0 100%);
      color: #fff; border: none; border-radius: 5px;
      padding: 5px 14px; font-size: 0.78rem; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-customer-riskmap:hover { opacity: 0.85; }

    /* ── リスクマップモーダル ── */
    .riskmap-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1100; align-items: center; justify-content: center; }
    .riskmap-overlay.open { display: flex; }
    .riskmap-modal { background: #fff; border-radius: 10px; width: min(860px,95vw); max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,.3); overflow: hidden; }
    .riskmap-modal-header { background: linear-gradient(135deg, var(--primary-dark,#001f4d) 0%, var(--primary,#003366) 100%); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; color: #fff; font-size: .95rem; font-weight: 700; }
    .riskmap-modal-close { background: transparent; border: none; color: rgba(255,255,255,.8); font-size: 1.1rem; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
    .riskmap-modal-close:hover { color: #fff; }
    .riskmap-modal-body { flex: 1; overflow: auto; padding: 0; }

    /* ── モーダル（名寄せ確認）── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 10px; width: 640px; max-width: 95vw; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--primary); }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid #eee; display: flex; gap: 10px; justify-content: flex-end; }
    .meiyose-input { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .meiyose-input label { font-size: 11px; color: var(--label-color); font-weight: 700; display: flex; flex-direction: column; gap: 4px; }
    .meiyose-input input, .meiyose-input select {
      height: 32px; border: 1px solid #d1d5db; border-radius: 4px; padding: 0 8px; font-size: 13px;
    }
    .btn-check { background: var(--primary); color: #fff; border: none; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 13px; font-weight: 700; }
    .btn-check:hover { background: var(--primary-dark); }
    .btn-cancel { background: #f3f4f6; color: #555; border: 1px solid #d1d5db; border-radius: 5px; padding: 8px 18px; cursor: pointer; font-size: 13px; }
    .match-result { margin-top: 14px; }
    .match-label { font-size: 12px; font-weight: 700; color: #555; margin-bottom: 8px; }
    .match-card { border: 1px solid var(--gray-border); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; font-size: 12px; }
    .match-card.is-match { border-color: #22c55e; background: #f0fdf4; }
    .match-name { font-size: 14px; font-weight: 700; color: #333; }
    .match-reasons { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .reason-tag { background: #dbeafe; color: #1d4ed8; border-radius: 10px; padding: 2px 8px; font-size: 10px; }
    .reason-tag.match { background: #dcfce7; color: #15803d; }
    .no-match-msg { color: #888; font-size: 13px; text-align: center; padding: 20px; }
  </style>
</head>
<body>

<!-- ── ヘッダー ── -->
<header class="site-header">
  <div class="header-left">
    <div class="header-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M32 4L8 14v18c0 13.3 10.3 25.7 24 29 13.7-3.3 24-15.7 24-29V14L32 4z"
              fill="none" stroke="var(--accent)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M32 12L14 20v12c0 9 6.8 17.4 18 20.4C45.2 49.4 52 41 52 32V20L32 12z"
              fill="rgba(255,255,255,0.15)"/>
        <path d="M22 32l7 7 13-13"
              stroke="var(--accent-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="header-logo-text">
        <div class="company">AX損害保険株式会社</div>
      </div>
    </div>
  </div>
  <span class="header-center-title">顧客管理</span>
  <div class="header-right">
    <div class="user-badge" id="user-badge"></div>
    <a id="btn-back-header" href="dashboard.html" class="btn-back">← ダッシュボードへ</a>
    <button class="btn-logout" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<!-- ── 説明バナー ── -->
<div class="info-banner">
  <strong>※ 顧客データは参照グループ単位で管理されます。</strong>
  同一人物でも参照グループが異なる場合は別顧客として登録されます。
  グループ内で複数代理店にまたがる契約がある場合は 🔗 で表示します。
</div>

<!-- ── メインコンテンツ ── -->
<main class="main">

  <!-- 検索バー -->
  <div class="search-card">
    <div class="search-title">🔍 顧客検索</div>
    <div class="search-row">
      <div class="search-group">
        <label>姓</label>
        <input type="text" id="q-last-name" placeholder="部分一致">
      </div>
      <div class="search-group">
        <label>名</label>
        <input type="text" id="q-first-name" placeholder="部分一致">
      </div>
      <div class="search-group staff-only" id="grp-agency-code">
        <label>代理店コード</label>
        <input type="text" id="q-agency-code" placeholder="例: A001">
      </div>
      <div class="not-insured-group">
        <span class="not-insured-label-title">未加入種目で絞り込み</span>
        <div class="not-insured-checks">
          <label><input type="checkbox" class="not-insured-check" value="自動車"> 自動車</label>
          <label><input type="checkbox" class="not-insured-check" value="火災"> 火災</label>
          <label><input type="checkbox" class="not-insured-check" value="傷害"> 傷害</label>
          <label><input type="checkbox" class="not-insured-check" value="自賠責"> 自賠責</label>
          <label><input type="checkbox" class="not-insured-check" value="賠償責任"> 賠償責任</label>
          <label><input type="checkbox" class="not-insured-check" value="サイバーリスク"> サイバー</label>
          <label><input type="checkbox" class="not-insured-check" value="所得補償"> 所得補償</label>
        </div>
      </div>
      <div class="search-group">
        <label>電話番号</label>
        <input type="text" id="q-tel" placeholder="部分一致">
      </div>
      <div class="search-group">
        <label>証券番号</label>
        <input type="text" id="q-contract-no" placeholder="部分一致">
      </div>
      <div class="search-group">
        <label>担当者コード</label>
        <input type="text" id="q-staff-code" placeholder="例: S001">
      </div>
      <div class="search-group staff-only" id="grp-group-code">
        <label>参照Gコード</label>
        <select id="q-group-code">
          <option value="">全グループ</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
      </div>
      <button class="btn-search" onclick="searchCustomers()">検索</button>
      <button class="btn-reset" onclick="resetSearch()">リセット</button>
      <button class="btn-report-export" onclick="requestCustomerReport()" title="帳票出力">
        <i class="fa-solid fa-file-lines"></i> 帳票出力
      </button>
    </div>
  </div>

  <!-- 件数バー -->
  <div class="result-bar">
    <div class="result-count">顧客数：<span id="result-count">-</span> 名</div>
    <button class="btn-meiyose" onclick="openMeiyoseModal()">🔍 名寄せチェック</button>
  </div>

  <!-- テーブル -->
  <div class="table-wrap">
    <table id="customer-table">
      <thead>
        <tr>
          <th style="width:40px" class="center"></th>
          <th style="width:32px" class="center">🔗</th>
          <th>顧客名</th>
          <th style="width:70px">参照G</th>
          <th>代理店</th>
          <th>電話番号</th>
          <th style="width:90px" class="center">コンタクト</th>
          <th style="width:80px" class="center">AI分析</th>
          <th class="ps-th">車</th>
          <th class="ps-th">火</th>
          <th class="ps-th">傷</th>
          <th class="ps-th">自賠</th>
          <th class="ps-th">賠責</th>
          <th class="ps-th">サイバー</th>
          <th class="ps-th">所得</th>
        </tr>
      </thead>
      <tbody id="customer-tbody">
        <tr><td colspan="15" class="loading">読み込み中...</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- ── 名寄せ確認モーダル ── -->
<div class="modal-overlay" id="meiyose-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🔍 名寄せチェック</div>
      <button class="modal-close" onclick="closeMeiyoseModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="meiyose-input">
        <label>参照グループ
          <select id="m-group-code">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </label>
        <label>性別
          <select id="m-gender">
            <option value="M">男性（M）</option>
            <option value="F">女性（F）</option>
          </select>
        </label>
        <label>生年月日
          <input type="date" id="m-birth-date">
        </label>
        <label>名（マスク前）
          <input type="text" id="m-first-name" placeholder="例: 結弦">
        </label>
        <label>電話番号
          <input type="text" id="m-tel" placeholder="例: 090-1207-9400">
        </label>
        <label>住所
          <input type="text" id="m-address" placeholder="例: 東京都港区...">
        </label>
      </div>
      <button class="btn-check" onclick="runMeiyoseCheck()">名寄せ判定実行</button>
      <div class="match-result" id="match-result"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeMeiyoseModal()">閉じる</button>
    </div>
  </div>
</div>

<script src="js/session.js"></script>
<script>
  const API_BASE = 'http://127.0.0.1:8000';

  // URLパラメータ
  const _urlParams     = new URLSearchParams(location.search);
  const _urlCustomerId = _urlParams.get('customer_id') ? Number(_urlParams.get('customer_id')) : null;
  const _urlExpand     = _urlParams.get('expand') === 'true';
  const _urlSearchName     = _urlParams.get('search_name')     || '';
  const _urlSearchTel      = _urlParams.get('search_tel')      || '';
  const _urlSearchContract = _urlParams.get('search_contract') || '';

  // ── 初期化 ──────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    requireAuth();
    applyTheme();

    applyUserBadge('user-badge');

    const info = getUserInfo();
    if (info) {
      const userType = sessionStorage.getItem('user_type') || '';
      if (userType === 'staff') {
        document.querySelectorAll('.staff-only').forEach(el => el.style.display = '');
      }
    }

    // 満期管理からの遷移：ヘッダーの戻るボタンを「← 満期管理に戻る」に切り替え
    if (_urlCustomerId) {
      const btn = document.getElementById('btn-back-header');
      btn.href        = 'maturity.html';
      btn.textContent = '← 満期管理に戻る';

      const searchCard = document.querySelector('.search-card');
      if (searchCard) searchCard.style.display = 'none';

      loadSingleCustomer(_urlCustomerId);
    } else if (_urlSearchName) {
      // ダッシュボードから名前検索で遷移
      document.getElementById('q-last-name').value = _urlSearchName;
      searchCustomers();
    } else if (_urlSearchTel) {
      // ダッシュボードから電話番号検索で遷移（tel パラメータとして送信）
      searchCustomersByTel(_urlSearchTel);
    } else if (_urlSearchContract) {
      // ダッシュボードから証券番号検索で遷移
      searchCustomersByContract(_urlSearchContract);
    } else {
      searchCustomers();
    }
  });

  // ── 単一顧客表示（満期管理リンクからの遷移）──────────────────
  async function loadSingleCustomer(customerId) {
    const tbody = document.getElementById('customer-tbody');
    tbody.innerHTML = '<tr><td colspan="15" class="loading">読み込み中...</td></tr>';
    document.getElementById('result-count').textContent = '-';

    try {
      const res = await fetch(`${API_BASE}/api/customers/${customerId}`, {
        headers: { Authorization: `Bearer ${getToken()}` }
      });
      if (!res.ok) {
        tbody.innerHTML = `<tr><td colspan="15" class="empty">顧客が見つかりません（ID: ${customerId}）</td></tr>`;
        return;
      }
      const data = await res.json();
      // 1件だけ renderTable し、そのまま詳細を展開
      renderTable([data.customer]);
      document.getElementById('result-count').textContent = 1;
      if (_urlExpand) {
        await toggleDetail(customerId);
      }
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="15" class="empty">通信エラーが発生しました</td></tr>';
    }
  }

  // ── 検索 ────────────────────────────────────────────────────────
  async function searchCustomers() {
    const tbody = document.getElementById('customer-tbody');
    tbody.innerHTML = '<tr><td colspan="15" class="loading">検索中...</td></tr>';
    document.getElementById('result-count').textContent = '-';

    const params = new URLSearchParams();
    const lastName   = document.getElementById('q-last-name').value.trim();
    const firstName  = document.getElementById('q-first-name').value.trim();
    const agencyCode = document.getElementById('q-agency-code')?.value.trim() || '';
    const tel        = document.getElementById('q-tel').value.trim();
    const contractNo = document.getElementById('q-contract-no').value.trim();
    const staffCode  = document.getElementById('q-staff-code').value.trim();
    const groupCode  = document.getElementById('q-group-code')?.value || '';

    if (lastName)   params.append('last_name',   lastName);
    if (firstName)  params.append('first_name',  firstName);
    if (agencyCode) params.append('agency_code', agencyCode);
    if (tel)        params.append('tel',         tel);
    if (contractNo) params.append('contract_no', contractNo);
    if (staffCode)  params.append('staff_code',  staffCode);
    if (groupCode)  params.append('group_code',  groupCode);

    // 未加入種目フィルタ
    const checkedTypes = [...document.querySelectorAll('.not-insured-check:checked')].map(el => el.value);
    if (checkedTypes.length > 0) params.append('not_insured_types', checkedTypes.join(','));

    try {
      const res  = await fetch(`${API_BASE}/api/customers?${params}`, {
        headers: { Authorization: `Bearer ${getToken()}` }
      });
      if (!res.ok) { showError(tbody, res.status); return; }

      const data = await res.json();
      document.getElementById('result-count').textContent = data.total;
      renderTable(data.customers);
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="15" class="empty">通信エラーが発生しました</td></tr>';
    }
  }

  async function searchCustomersByTel(tel) {
    const tbody = document.getElementById('customer-tbody');
    tbody.innerHTML = '<tr><td colspan="15" class="loading">検索中...</td></tr>';
    document.getElementById('result-count').textContent = '-';
    const params = new URLSearchParams({ tel });
    try {
      const res = await fetch(`${API_BASE}/api/customers?${params}`, {
        headers: { Authorization: `Bearer ${getToken()}` }
      });
      if (!res.ok) { showError(tbody, res.status); return; }
      const data = await res.json();
      document.getElementById('result-count').textContent = data.total;
      renderTable(data.customers);
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="15" class="empty">通信エラーが発生しました</td></tr>';
    }
  }

  async function searchCustomersByContract(contractNo) {
    const tbody = document.getElementById('customer-tbody');
    tbody.innerHTML = '<tr><td colspan="15" class="loading">検索中...</td></tr>';
    document.getElementById('result-count').textContent = '-';
    const params = new URLSearchParams({ contract_no: contractNo });
    try {
      const res = await fetch(`${API_BASE}/api/customers?${params}`, {
        headers: { Authorization: `Bearer ${getToken()}` }
      });
      if (!res.ok) { showError(tbody, res.status); return; }
      const data = await res.json();
      document.getElementById('result-count').textContent = data.total;
      renderTable(data.customers);
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="15" class="empty">通信エラーが発生しました</td></tr>';
    }
  }

  function resetSearch() {
    ['q-last-name','q-first-name','q-agency-code','q-tel','q-contract-no','q-staff-code'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.querySelectorAll('.not-insured-check').forEach(el => el.checked = false);
    const gc = document.getElementById('q-group-code');
    if (gc) gc.value = '';
    searchCustomers();
  }

  // ── テーブル描画 ─────────────────────────────────────────────────
  const POLICY_COLS = ['自動車','火災','傷害','自賠責','賠償責任','サイバーリスク','所得補償'];
  const POLICY_SHORT = ['車','火','傷','自賠','賠責','サイバー','所得'];

  function maskTel(tel) {
    if (!tel) return '—';
    return tel.replace(/(\d{4})$/, '●●●●');
  }

  function renderTable(customers) {
    const tbody = document.getElementById('customer-tbody');
    if (!customers.length) {
      tbody.innerHTML = '<tr><td colspan="15" class="empty">該当する顧客が見つかりません</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    customers.forEach(c => {
      const rowId   = `row-${c.customer_id}`;
      const detailId = `detail-${c.customer_id}`;
      const summary  = c.policy_summary || {};

      const psTds = POLICY_COLS.map((pt, i) => {
        const held = summary[pt] === true;
        return `<td class="ps-td">
          <span class="ps-label">${POLICY_SHORT[i]}</span>
          <span class="ps-val ${held ? 'held' : 'none'}">${held ? '○' : '－'}</span>
        </td>`;
      }).join('');

      const agencyBadges = (c.held_agencies || []).map(ac =>
        `<span class="agency-badge">${ac}</span>`
      ).join('');

      const cnt = c.contact_count || 0;
      const customerName = encodeURIComponent(`${c.last_name} ${c.first_name}`);
      const contactCell = cnt > 0
        ? `<a class="contact-link" href="contact.html?customer_id=${c.customer_id}&customer_name=${customerName}">(${cnt}件)</a>`
        : `<a class="contact-none" href="contact.html?customer_id=${c.customer_id}&customer_name=${customerName}">(なし)</a>`;

      const mainRow = document.createElement('tr');
      mainRow.id = rowId;
      mainRow.innerHTML = `
        <td class="center">
          <button class="toggle-btn" onclick="toggleDetail(${c.customer_id})">＋</button>
        </td>
        <td class="center">${c.multi_agency ? '<span class="multi-icon">🔗</span>' : ''}</td>
        <td><strong>${c.last_name} ${c.first_name}</strong></td>
        <td class="center">${c.group_code}</td>
        <td>${agencyBadges}</td>
        <td class="tel-masked">${maskTel(c.tel)}</td>
        <td class="center">${contactCell}</td>
        <td class="center">
          <button onclick="event.stopPropagation(); analyzeCustomer(event, ${c.customer_id})"
            style="background:var(--accent);color:var(--primary-dark);border:none;border-radius:6px;padding:3px 10px;cursor:pointer;font-size:0.8rem;font-weight:700;white-space:nowrap;">
            <i class="fas fa-robot"></i> AI分析
          </button>
        </td>
        ${psTds}
      `;
      tbody.appendChild(mainRow);

      // 詳細行（初期非表示）
      const detailRow = document.createElement('tr');
      detailRow.id    = detailId;
      detailRow.className = 'detail-row';
      detailRow.style.display = 'none';
      detailRow.innerHTML = `<td colspan="15" class="detail-cell" id="detail-content-${c.customer_id}">
        <div style="color:#999;font-size:12px">読み込み中...</div>
      </td>`;
      tbody.appendChild(detailRow);
    });
  }

  // ── 詳細展開 ─────────────────────────────────────────────────────
  async function toggleDetail(customerId) {
    const detailRow = document.getElementById(`detail-${customerId}`);
    const btn       = document.querySelector(`#row-${customerId} .toggle-btn`);
    const isOpen    = detailRow.style.display !== 'none';

    if (isOpen) {
      detailRow.style.display = 'none';
      btn.textContent = '＋';
      return;
    }

    detailRow.style.display = '';
    btn.textContent = '－';

    try {
      const res = await fetch(`${API_BASE}/api/customers/${customerId}`, {
        headers: { Authorization: `Bearer ${getToken()}` }
      });
      if (!res.ok) { return; }
      const data = await res.json();
      renderDetail(customerId, data);
    } catch (e) {
      document.getElementById(`detail-content-${customerId}`).innerHTML =
        '<span style="color:red">読み込みエラー</span>';
    }
  }

  function renderDetail(customerId, data) {
    const c = data.customer;
    const contracts = data.contracts || [];

    const contractRows = contracts.map(ct => `
      <tr>
        <td>${ct.policy_type || '—'}</td>
        <td>${ct.contract_no ? `<a href="contract_detail.html?contract_no=${encodeURIComponent(ct.contract_no)}&from=customer" style="color:var(--primary);font-weight:600;text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${ct.contract_no}</a>` : '—'}</td>
        <td>${ct.agency_code || '—'}</td>
        <td>${ct.expiry_date || '—'}</td>
        <td style="text-align:right">${ct.annual_premium ? ct.annual_premium.toLocaleString() + '円' : '—'}</td>
        <td>${ct.staff_code || '—'}</td>
        <td>${ct.renewal_status || '—'}</td>
      </tr>
    `).join('') || '<tr><td colspan="7" style="color:#bbb;text-align:center">契約なし</td></tr>';

    document.getElementById(`detail-content-${customerId}`).innerHTML = `
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">住所</div><div class="detail-value">${c.address || '—'}</div></div>
        <div class="detail-item"><div class="detail-label">メールアドレス</div><div class="detail-value">${c.email || '—'}</div></div>
        <div class="detail-item"><div class="detail-label">生年月日</div><div class="detail-value">${c.birth_date || '—'}</div></div>
        <div class="detail-item"><div class="detail-label">性別</div><div class="detail-value">${c.gender === 'M' ? '男性' : c.gender === 'F' ? '女性' : '—'}</div></div>
        <div class="detail-item"><div class="detail-label">家族構成</div><div class="detail-value">${c.family_structure || '—'}</div></div>
        <div class="detail-item"><div class="detail-label">趣味</div><div class="detail-value">${c.hobbies || '—'}</div></div>
        <div class="detail-item"><div class="detail-label">資産情報</div><div class="detail-value">${c.assets_info || '—'}</div></div>
      </div>
      <div class="contract-list">
        <div class="contract-list-title" style="display:flex;align-items:center;justify-content:space-between;">
          <span>📋 保有契約一覧（${contracts.length}件）</span>
          <button class="btn-customer-riskmap" onclick="openCustomerRiskmap(${customerId})">
            <i class="fa-solid fa-chart-pie"></i> リスクマップ
          </button>
        </div>
        <table class="contract-table">
          <thead>
            <tr>
              <th>種目</th><th>証券番号</th><th>代理店</th><th>満期日</th>
              <th style="text-align:right">年換算保険料</th><th>担当者</th><th>更改STS</th>
            </tr>
          </thead>
          <tbody>${contractRows}</tbody>
        </table>
      </div>
    `;
  }

  // ── 名寄せモーダル ───────────────────────────────────────────────
  function openMeiyoseModal() {
    document.getElementById('match-result').innerHTML = '';
    document.getElementById('meiyose-modal').classList.add('open');
  }
  function closeMeiyoseModal() {
    document.getElementById('meiyose-modal').classList.remove('open');
  }

  async function runMeiyoseCheck() {
    const body = {
      group_code:  document.getElementById('m-group-code').value,
      gender:      document.getElementById('m-gender').value,
      birth_date:  document.getElementById('m-birth-date').value,
      first_name:  document.getElementById('m-first-name').value.trim(),
      tel:         document.getElementById('m-tel').value.trim(),
      address:     document.getElementById('m-address').value.trim(),
    };
    if (!body.birth_date || !body.first_name) {
      alert('生年月日と名は必須です');
      return;
    }

    const resultEl = document.getElementById('match-result');
    resultEl.innerHTML = '<div style="color:#999;font-size:13px">判定中...</div>';

    try {
      const res = await fetch(`${API_BASE}/api/customers/match`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${getToken()}` },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      renderMeiyoseResult(data);
    } catch (e) {
      resultEl.innerHTML = '<div style="color:red">通信エラーが発生しました</div>';
    }
  }

  function renderMeiyoseResult(data) {
    const resultEl = document.getElementById('match-result');
    const cands    = data.candidates || [];

    if (!cands.length) {
      resultEl.innerHTML = '<div class="no-match-msg">一致する候補が見つかりませんでした</div>';
      return;
    }

    const matchedId = data.matched_customer_id;
    let html = `<div class="match-label">
      ${matchedId ? `✅ 既存顧客ID <strong>${matchedId}</strong> に名寄せ候補あり` : '⚠️ 必須3項目の候補あり（電話番号・住所未一致）'}
    </div>`;

    cands.forEach(c => {
      const reasonHtml = c.match_reasons.map(r =>
        `<span class="reason-tag ${c.is_match ? 'match' : ''}">${r}</span>`
      ).join('');
      html += `<div class="match-card ${c.is_match ? 'is-match' : ''}">
        <div class="match-name">${c.last_name} ${c.first_name}（ID: ${c.customer_id}）</div>
        <div style="font-size:11px;color:#666;margin-top:4px">
          生年月日: ${c.birth_date || '—'} ／ 電話: ${c.tel || '—'}
        </div>
        <div class="match-reasons">${reasonHtml}</div>
      </div>`;
    });

    resultEl.innerHTML = html;
  }

  function showError(tbody, status) {
    const msg = status === 401 ? '認証エラー。再ログインしてください' : `エラー（${status}）`;
    tbody.innerHTML = `<tr><td colspan="15" class="empty">${msg}</td></tr>`;
  }

  // Enter キーで検索
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') searchCustomers();
  });

  // ── AI分析（個別顧客） ───────────────────────────────────────────
  async function analyzeCustomer(event, customerId) {
    const btn = event.target.closest('button');
    btn.disabled  = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 分析中...';
    try {
      const res = await fetch(`${API_BASE}/api/ai/recommend/${customerId}`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${getToken()}` }
      });
      const data = await res.json();
      if (!res.ok) {
        alert('AI分析に失敗しました: ' + (data.detail || res.status));
        return;
      }
      showAiRecommendModal(data);
    } catch (e) {
      alert('AI分析に失敗しました');
    } finally {
      btn.disabled  = false;
      btn.innerHTML = '<i class="fas fa-robot"></i> AI分析';
    }
  }

  // ── AIレコメンド結果モーダル表示 ────────────────────────────────
  function showAiRecommendModal(data) {
    const types = (data.recommend_types || []).join('、');
    const score = Math.round((data.risk_score || 0) * 100);
    const cls   = score >= 70 ? 'high' : score >= 40 ? 'medium' : 'low';
    const levelLabels = { high: 'ハイリスク', medium: '中リスク', low: '低リスク' };
    const levelColors = { high: '#ef4444', medium: '#f59e0b', low: '#22c55e' };

    // モーダル内容を更新
    document.getElementById('ai-modal-name').textContent    = `${data.customer_name || ''} 様`;
    // 種目コード→日本語変換マップ
    const _ptJa = { AUTO:'自動車', FIRE:'火災', INJURY:'傷害', JIBAI:'自賠責', LIABILITY:'賠償責任', CYBER:'サイバーリスク', INCOME:'所得補償' };
    document.getElementById('ai-modal-types').innerHTML     =
      (data.recommend_types || []).map(t =>
        `<span style="display:inline-block;background:#22c55e;color:#fff;border-radius:12px;padding:2px 10px;font-size:0.72rem;font-weight:700;margin:2px">${_ptJa[t] || t}</span>`
      ).join('') || '<span style="color:#999">なし</span>';
    document.getElementById('ai-modal-score-pct').textContent  = score + '%';
    document.getElementById('ai-modal-score-label').textContent = levelLabels[cls];
    document.getElementById('ai-modal-score-label').style.color = levelColors[cls];
    const barEl = document.getElementById('ai-modal-score-bar');
    barEl.style.width      = score + '%';
    barEl.style.background = levelColors[cls];
    document.getElementById('ai-modal-reason').textContent = data.reason || '—';

    document.getElementById('ai-recommend-modal-overlay').classList.add('open');
  }

  // AIレコメンドモーダルを閉じる
  function closeAiRecommendModal() {
    document.getElementById('ai-recommend-modal-overlay').classList.remove('open');
  }

  // ── トースト通知 ──────────────────────────────────────────────────
  function showToastNotify(msg, isError = false) {
    const el = document.getElementById('toast-notify');
    el.textContent = msg;
    el.style.background = isError ? '#dc2626' : '#1e3a5f';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 5000);
  }

  // ── 帳票出力（顧客一覧）─────────────────────────────────────────
  async function requestCustomerReport() {
    const token = getToken();
    if (!token) { alert('再ログインしてください。'); return; }

    // 現在の検索条件を収集
    const lastName   = document.getElementById('q-last-name')?.value.trim() || '';
    const firstName  = document.getElementById('q-first-name')?.value.trim() || '';
    const agencyCode = document.getElementById('q-agency-code')?.value.trim() || '';
    const groupCode  = document.getElementById('q-group-code')?.value || '';
    const tel        = document.getElementById('q-tel')?.value.trim() || '';
    const contractNo = document.getElementById('q-contract-no')?.value.trim() || '';
    const checkedTypes = [...document.querySelectorAll('.not-insured-check:checked')].map(el => el.value);

    const searchParams = JSON.stringify({
      last_name:          lastName,
      first_name:         firstName,
      agency_code:        agencyCode,
      group_code:         groupCode,
      tel:                tel,
      contract_no:        contractNo,
      not_insured_types:  checkedTypes,
    });

    const now = new Date();
    const dateStr = now.toISOString().slice(0, 10).replace(/-/g, '');
    const agCode  = sessionStorage.getItem('agency_code') || '';
    const reportName = `顧客一覧_${agCode}_${dateStr}`;

    try {
      const res = await fetch(`${API_BASE}/api/reports/request`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({
          report_type:   'customer_list',
          report_name:   reportName,
          search_params: searchParams,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        showToastNotify('帳票の受付に失敗しました: ' + (data.detail || res.status), true);
        return;
      }
      showToastNotify(`受付番号 ${data.request_no} で受け付けました。帳票管理画面でご確認ください。`);
    } catch (e) {
      showToastNotify('帳票出力リクエスト中にエラーが発生しました', true);
    }
  }

  /* ─── 顧客リスクマップモーダル ─────────────────────────────────── */

  // 顧客リスクマップを生成してiframeモーダルで表示する
  async function openCustomerRiskmap(customerId) {
    const token = getToken();
    if (!token) { alert('再ログインしてください。'); return; }

    const overlay = document.getElementById('customer-riskmap-overlay');
    const loading = document.getElementById('customer-riskmap-loading');
    const iframe  = document.getElementById('customer-riskmap-iframe');
    const titleEl = document.getElementById('customer-riskmap-title');
    titleEl.textContent = `顧客リスクマップ（ID: ${customerId}）`;
    overlay.classList.add('open');
    loading.style.display = 'block';
    iframe.style.display  = 'none';
    iframe.src = '';

    try {
      // POST でPDFを生成
      const res = await fetch(`${API_BASE}/api/riskmap/customer/${encodeURIComponent(customerId)}`, {
        method:  'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert('リスクマップの生成に失敗しました: ' + (err.detail || res.status));
        overlay.classList.remove('open');
        return;
      }
      const data = await res.json();
      // base64 → Blob URL → iframe表示
      const binary = atob(data.pdf_data);
      const bytes  = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const blob   = new Blob([bytes], { type: 'application/pdf' });
      const url    = URL.createObjectURL(blob);
      iframe.src            = url;
      loading.style.display = 'none';
      iframe.style.display  = 'block';
    } catch (e) {
      console.error('顧客リスクマップ生成エラー:', e);
      alert('リスクマップの生成中にエラーが発生しました。');
      overlay.classList.remove('open');
    }
  }

  // 顧客リスクマップモーダルを閉じる
  function closeCustomerRiskmapModal(event) {
    if (event && event.target !== document.getElementById('customer-riskmap-overlay')) return;
    const overlay = document.getElementById('customer-riskmap-overlay');
    const iframe  = document.getElementById('customer-riskmap-iframe');
    if (iframe.src && iframe.src.startsWith('blob:')) URL.revokeObjectURL(iframe.src);
    iframe.src = '';
    overlay.classList.remove('open');
  }
</script>

<!-- AIレコメンド結果モーダル -->
<div id="ai-recommend-modal-overlay"
  style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1200;align-items:center;justify-content:center;"
  onclick="if(event.target===this)closeAiRecommendModal()">
  <div style="background:#fff;border-radius:10px;width:480px;max-width:95vw;padding:28px 30px;position:relative;box-shadow:0 8px 40px rgba(0,0,0,0.25);max-height:90vh;overflow-y:auto;">
    <button onclick="closeAiRecommendModal()"
      style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:1.3rem;color:#999;cursor:pointer;">×</button>
    <div style="font-size:1rem;font-weight:700;color:var(--primary);margin-bottom:20px;display:flex;align-items:center;gap:8px;">
      <span style="display:inline-block;width:4px;height:18px;background:var(--accent);border-radius:2px;"></span>
      <i class="fas fa-robot" style="color:var(--accent)"></i> AIレコメンド結果
    </div>
    <div id="ai-modal-name" style="font-size:1.1rem;font-weight:800;color:#333;margin-bottom:18px;"></div>
    <div style="margin-bottom:14px;">
      <div style="font-size:0.72rem;font-weight:700;color:var(--primary);letter-spacing:0.04em;margin-bottom:6px;">推奨種目</div>
      <div id="ai-modal-types"></div>
    </div>
    <div style="margin-bottom:14px;">
      <div style="font-size:0.72rem;font-weight:700;color:var(--primary);letter-spacing:0.04em;margin-bottom:6px;">
        リスクスコア：<span id="ai-modal-score-pct" style="font-size:1rem;font-weight:800;">0%</span>
        <span id="ai-modal-score-label" style="font-size:0.8rem;margin-left:8px;font-weight:700;"></span>
      </div>
      <div style="width:100%;height:12px;background:#e5e7eb;border-radius:6px;overflow:hidden;">
        <div id="ai-modal-score-bar" style="height:100%;border-radius:6px;transition:width 0.5s ease;width:0%;"></div>
      </div>
    </div>
    <div>
      <div style="font-size:0.72rem;font-weight:700;color:var(--primary);letter-spacing:0.04em;margin-bottom:6px;">推奨理由</div>
      <div id="ai-modal-reason" style="font-size:0.82rem;color:#333;line-height:1.6;white-space:pre-wrap;"></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:20px;">
      <button onclick="closeAiRecommendModal()"
        style="background:#fff;color:var(--primary);border:1.5px solid #d1d5db;border-radius:4px;padding:8px 18px;font-size:0.85rem;cursor:pointer;">
        閉じる
      </button>
    </div>
  </div>
</div>
<script>
  // AIレコメンドモーダルはdisplay:flexで表示する
  document.getElementById('ai-recommend-modal-overlay').style.display = 'none';
  // openクラスでflex表示
  const _aiModalStyle = document.createElement('style');
  _aiModalStyle.textContent = '#ai-recommend-modal-overlay.open{display:flex!important;}';
  document.head.appendChild(_aiModalStyle);
</script>

<!-- 顧客リスクマップPDFモーダル -->
<div id="customer-riskmap-overlay" class="riskmap-overlay" onclick="closeCustomerRiskmapModal(event)">
  <div class="riskmap-modal">
    <div class="riskmap-modal-header">
      <span id="customer-riskmap-title">顧客リスクマップ</span>
      <button class="riskmap-modal-close" onclick="closeCustomerRiskmapModal(null)">✕</button>
    </div>
    <div class="riskmap-modal-body">
      <div id="customer-riskmap-loading" style="display:none; text-align:center; padding:40px 0; color:#666;">
        <i class="fa-solid fa-spinner fa-spin"></i> PDF生成中...
      </div>
      <iframe id="customer-riskmap-iframe" src="" style="width:100%; height:70vh; border:none; display:none;"></iframe>
    </div>
  </div>
</div>

</body>
</html>
