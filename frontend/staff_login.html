<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社員ログイン｜AX損害保険株式会社</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pink:       #FF1493;
      --pink-dark:  #CC0077;
      --pink-mid:   #E01288;
      --pink-light: #FF69B4;
      --white:      #ffffff;
      --gray-bg:    #fff0f7;
      --gray-border:#f0a0cc;
      --text-main:  #2e001a;
      --text-sub:   #884466;
    }

    body {
      min-height: 100vh;
      background: var(--gray-bg);
      display: flex;
      flex-direction: column;
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: var(--text-main);
    }

    /* ─── ヘッダーバー ─── */
    .top-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--pink-dark) 0%, var(--pink-light) 50%, var(--pink-dark) 100%);
    }

    /* ─── メインコンテナ ─── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(255,20,147,0.15), 0 1px 4px rgba(255,20,147,0.08);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    /* ─── カードヘッダー ─── */
    .card-header {
      background: linear-gradient(160deg, var(--pink-dark) 0%, var(--pink-mid) 100%);
      padding: 36px 40px 32px;
      text-align: center;
      position: relative;
    }

    .card-header::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: var(--pink-light);
      margin: 16px auto 0;
      border-radius: 1px;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,105,180,0.7);
      border-radius: 50%;
      margin-bottom: 16px;
    }

    .logo-wrap svg { width: 40px; height: 40px; }

    .company-name {
      color: #FFB6C1;
      font-size: 1.17rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .system-name {
      color: var(--white);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    /* ─── フォーム部 ─── */
    .card-body { padding: 36px 40px 32px; }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--pink-dark);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    label .required { color: var(--pink); margin-left: 4px; }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--gray-border);
      pointer-events: none;
      transition: color 0.2s;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1.5px solid var(--gray-border);
      border-radius: 5px;
      font-size: 0.95rem;
      color: var(--text-main);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255,20,147,0.12);
    }

    /* ─── エラーメッセージ ─── */
    .error-msg {
      display: none;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      border-radius: 5px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-top: 16px;
      text-align: center;
    }

    .error-msg.show { display: block; }

    /* ─── ログインボタン ─── */
    .btn-login {
      display: block;
      width: 100%;
      padding: 13px;
      margin-top: 28px;
      background: linear-gradient(135deg, var(--pink-dark) 0%, var(--pink-mid) 100%);
      color: var(--white);
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 2px 8px rgba(255,20,147,0.35);
    }

    .btn-login:hover:not(:disabled) {
      opacity: 0.92;
      box-shadow: 0 4px 14px rgba(255,20,147,0.45);
      transform: translateY(-1px);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(255,20,147,0.25);
    }

    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    /* ─── 区切り線・リンク ─── */
    .divider {
      border: none;
      border-top: 1px solid #ffd6ec;
      margin: 28px 0 20px;
    }

    .link-area {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-sub);
    }

    .link-area a { color: var(--pink-dark); text-decoration: none; font-weight: 600; }
    .link-area a:hover { text-decoration: underline; }

    /* ─── フッター ─── */
    footer {
      background: var(--pink-dark);
      color: rgba(255,255,255,0.6);
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      padding: 14px 16px;
    }

    /* ─── レスポンシブ ─── */
    @media (max-width: 480px) {
      .card-header { padding: 28px 24px 24px; }
      .card-body   { padding: 28px 24px 24px; }
      .system-name { font-size: 1rem; }
    }
  </style>
  <script src="js/session.js"></script>
</head>
<body>

  <div class="top-bar"></div>

  <main class="main">
    <div class="card">

      <!-- カードヘッダー：ロゴ・社名 -->
      <div class="card-header">
        <div class="logo-wrap">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M32 4L8 14v18c0 13.3 10.3 25.7 24 29 13.7-3.3 24-15.7 24-29V14L32 4z"
                  fill="none" stroke="#FF1493" stroke-width="3" stroke-linejoin="round"/>
            <path d="M32 12L14 20v12c0 9 6.8 17.4 18 20.4C45.2 49.4 52 41 52 32V20L32 12z"
                  fill="rgba(255,20,147,0.25)"/>
            <polyline points="22,32 29,39 43,25"
                      stroke="#FF69B4" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="company-name">AX損害保険株式会社</p>
        <p class="system-name">社員専用システム</p>
      </div>

      <!-- フォーム -->
      <div class="card-body">
        <form id="login-form" autocomplete="off">

          <div class="form-group">
            <label for="staff-code">社員番号<span class="required">*</span></label>
            <div class="input-wrap">
              <input type="text" id="staff-code" name="staff_code"
                     placeholder="例）S001" maxlength="20" required>
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label for="password">パスワード<span class="required">*</span></label>
            <div class="input-wrap">
              <input type="password" id="password" name="password"
                     placeholder="パスワードを入力" maxlength="128" required>
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                   stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="5" y="11" width="14" height="10" rx="2"/>
                <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
              </svg>
            </div>
          </div>

          <!-- エラーメッセージ表示エリア -->
          <div id="error-msg" class="error-msg"></div>

          <button type="submit" id="btn-login" class="btn-login">ログイン</button>
        </form>

        <hr class="divider">

        <div class="link-area">
          <a href="login.html">代理店の方はこちら</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    &copy; 2026 AX損害保険株式会社. All Rights Reserved.
  </footer>

  <script>
    const API_URL = 'http://127.0.0.1:8000/api/staff/login';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn     = document.getElementById('btn-login');
      const errDiv  = document.getElementById('error-msg');
      const payload = {
        staff_code: document.getElementById('staff-code').value.trim(),
        password:   document.getElementById('password').value,
      };

      btn.disabled    = true;
      btn.textContent = '認証中...';
      errDiv.className = 'error-msg';

      try {
        const res = await fetch(API_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload),
        });

        const data = await res.json();

        if (res.ok) {
          // 認証成功：セッション情報を共通関数で保存してスタッフダッシュボードへ遷移
          saveStaffSession(
            data.access_token, data.staff_code, data.name,
            data.role_id, data.role_name, data.buka_code,
            data.permissions || [], data.managed_agencies || []
          );
          window.location.href = 'staff_dashboard.html';
        } else {
          errDiv.textContent = data.detail || 'ログインに失敗しました';
          errDiv.className   = 'error-msg show';
          btn.disabled       = false;
          btn.textContent    = 'ログイン';
        }
      } catch (_) {
        errDiv.textContent = 'サーバーに接続できません。APIサーバーが起動しているか確認してください。';
        errDiv.className   = 'error-msg show';
        btn.disabled       = false;
        btn.textContent    = 'ログイン';
      }
    });
  </script>

</body>
</html>
