<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>意向確認｜AX損害保険株式会社</title>
  <link rel="stylesheet" href="js/theme.css">
  <script src="js/session.js"></script>
  <script>applyTheme()</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--gray-bg);
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      color: var(--text-main);
      font-size: 13px;
    }

    /* ═══ HEADER ═══════════════════════════════════════════════ */
    .site-header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 12px var(--primary-shadow);
    }
    .header-logo { display:flex; align-items:center; gap:10px; color:#fff; text-decoration:none; }
    .header-logo svg { width:28px; height:28px; flex-shrink:0; }
    .header-logo-text .company { font-size:1.02rem; font-weight:700; letter-spacing:0.08em; color:var(--accent); }

    .header-right { display:flex; align-items:center; gap:10px; }
    .page-badge {
      background: rgba(255,255,255,0.15); border: 1px solid var(--accent-border);
      color: var(--accent-light); border-radius:4px; padding:3px 10px;
      font-size:0.75rem; font-weight:700;
    }
    .user-badge {
      background: rgba(255,255,255,0.1); border: 1px solid var(--accent-border);
      border-radius:20px; padding:4px 14px; color:#fff; font-size:0.8rem;
    }
    .user-badge span { color:var(--accent); font-weight:700; margin-right:6px; }
    .btn-logout {
      background:transparent; border:1.5px solid var(--accent-border-btn);
      color:var(--accent-light); border-radius:4px; padding:5px 14px;
      font-size:0.78rem; font-weight:600; cursor:pointer;
      transition:background 0.2s,color 0.2s;
    }
    .btn-logout:hover { background:var(--accent); color:var(--primary-dark); border-color:var(--accent); }
    .btn-back {
      background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.25);
      color:#fff; border-radius:4px; padding:5px 12px;
      font-size:0.75rem; cursor:pointer; text-decoration:none;
      transition:background 0.2s;
    }
    .btn-back:hover { background:rgba(255,255,255,0.18); }
    .accent-bar { height:3px; background:linear-gradient(90deg,var(--primary-dark) 0%,var(--accent) 50%,var(--primary-dark) 100%); }

    /* ═══ MAIN ══════════════════════════════════════════════════ */
    .main-content { max-width:1400px; margin:0 auto; padding:20px 16px 40px; }
    .page-title {
      font-size:1.1rem; font-weight:700; color:var(--primary);
      margin-bottom:16px; display:flex; align-items:center; gap:8px;
    }
    .page-title::before { content:''; display:inline-block; width:4px; height:20px; background:var(--accent); border-radius:2px; }

    /* ═══ SEARCH CARD ═══════════════════════════════════════════ */
    .search-card { background:#fff; border-radius:8px; box-shadow:0 2px 10px var(--card-shadow); padding:18px 20px; margin-bottom:16px; }
    .search-grid { display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; }
    .field-group { display:flex; flex-direction:column; gap:4px; }
    .field-group label { font-size:0.72rem; font-weight:600; color:var(--primary); letter-spacing:0.04em; }
    .field-group input, .field-group select {
      border:1.5px solid var(--gray-border); border-radius:4px;
      padding:6px 10px; font-size:0.82rem; color:var(--text-main);
      outline:none; background:#fff; transition:border-color 0.2s; height:32px;
    }
    .field-group input:focus, .field-group select:focus { border-color:var(--primary); }
    .field-group.text input { width:150px; }
    .field-group.sel select { width:140px; }
    .btn-group { display:flex; gap:8px; align-items:flex-end; }
    .btn-search {
      background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);
      color:#fff; border:none; border-radius:4px;
      padding:0 20px; height:32px; font-size:0.82rem; font-weight:700;
      cursor:pointer; transition:opacity 0.2s;
    }
    .btn-search:hover { opacity:0.88; }
    .btn-clear {
      background:#fff; color:var(--primary); border:1.5px solid var(--gray-border);
      border-radius:4px; padding:0 16px; height:32px;
      font-size:0.82rem; cursor:pointer; transition:border-color 0.2s;
    }
    .btn-clear:hover { border-color:var(--primary); }

    /* ═══ 集計バッジエリア ══════════════════════════════════════ */
    .count-bar {
      display:flex; flex-wrap:wrap; gap:10px; margin-bottom:12px;
      align-items:center;
    }
    .count-badge {
      display:inline-flex; align-items:center; gap:5px;
      border-radius:20px; padding:4px 14px;
      font-size:0.78rem; font-weight:700; white-space:nowrap;
    }
    .count-badge.total   { background:var(--primary); color:#fff; }
    .count-badge.unrecorded { background:#fee2e2; color:#dc2626; }
    .count-badge.recorded   { background:#dbeafe; color:#1d4ed8; }
    .count-badge.confirmed  { background:#dcfce7; color:#15803d; }

    /* ═══ TABLE CARD ════════════════════════════════════════════ */
    .table-card { background:#fff; border-radius:8px; box-shadow:0 2px 10px var(--card-shadow); overflow:hidden; }
    .table-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; white-space:nowrap; }

    thead tr { background:var(--primary); }
    thead th {
      color:#fff; font-size:0.72rem; font-weight:700;
      padding:9px 8px; text-align:center; letter-spacing:0.04em;
      border-right:1px solid rgba(255,255,255,0.1);
    }
    thead th:last-child { border-right:none; }

    tbody tr { transition:background 0.15s; }
    tbody tr:hover { background:var(--gray-card); }
    tbody td {
      padding:8px 8px; border-bottom:1px solid var(--gray-border);
      text-align:center; font-size:0.78rem; color:var(--text-main); vertical-align:middle;
    }
    tbody td.td-left { text-align:left; max-width:200px; overflow:hidden; text-overflow:ellipsis; }

    /* ステータスバッジ */
    .badge { display:inline-block; border-radius:12px; padding:2px 10px; font-size:0.7rem; font-weight:700; white-space:nowrap; }
    .badge-unrecorded { background:#fee2e2; color:#dc2626; }
    .badge-recorded   { background:#dbeafe; color:#1d4ed8; }
    .badge-confirmed  { background:#dcfce7; color:#15803d; }

    .btn-record {
      background:var(--primary); color:#fff; border:none; border-radius:4px;
      padding:4px 12px; font-size:0.72rem; font-weight:700; cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-record:hover { opacity:0.82; }
    .btn-edit {
      background:#f59e0b; color:#fff; border:none; border-radius:4px;
      padding:4px 12px; font-size:0.72rem; font-weight:700; cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-edit:hover { opacity:0.82; }

    .empty-msg { text-align:center; padding:40px; color:var(--text-sub); font-size:0.9rem; }

    /* ═══ ページネーション ══════════════════════════════════════ */
    .pagination {
      display:flex; align-items:center; justify-content:center; gap:8px;
      padding:14px 16px; border-top:1px solid var(--gray-border);
      background:#fff;
    }
    .btn-page {
      background:#fff; color:var(--primary); border:1.5px solid var(--gray-border);
      border-radius:4px; padding:5px 14px; font-size:0.78rem; cursor:pointer;
      transition:border-color 0.2s;
    }
    .btn-page:hover:not(:disabled) { border-color:var(--primary); }
    .btn-page:disabled { color:var(--text-sub); cursor:not-allowed; }
    .page-info { font-size:0.78rem; color:var(--text-sub); }

    /* ═══ モーダル ═══════════════════════════════════════════════ */
    .modal-backdrop {
      display:none; position:fixed; inset:0; z-index:500;
      background:rgba(0,0,0,0.4);
    }
    .modal-backdrop.open { display:flex; align-items:center; justify-content:center; }
    .modal {
      background:#fff; border-radius:10px; box-shadow:0 8px 40px rgba(0,0,0,0.22);
      padding:28px 30px; width:540px; max-width:96vw; max-height:90vh; overflow-y:auto;
      position:relative;
    }
    .modal-title {
      font-size:1rem; font-weight:700; color:var(--primary);
      margin-bottom:20px; display:flex; align-items:center; gap:8px;
    }
    .modal-title::before { content:''; display:inline-block; width:4px; height:18px; background:var(--accent); border-radius:2px; }
    .modal-field { margin-bottom:14px; }
    .modal-field label { display:block; font-size:0.72rem; font-weight:600; color:var(--primary); margin-bottom:5px; letter-spacing:0.04em; }
    .modal-field select, .modal-field input, .modal-field textarea {
      width:100%; border:1.5px solid var(--gray-border); border-radius:4px;
      padding:7px 10px; font-size:0.85rem; color:var(--text-main);
      outline:none; transition:border-color 0.2s; font-family:inherit;
    }
    .modal-field select:focus, .modal-field input:focus, .modal-field textarea:focus { border-color:var(--primary); }
    .modal-field input[readonly], .modal-field textarea[readonly] {
      background:#f9fafb; color:var(--text-sub); cursor:default;
    }
    .modal-field textarea { resize:vertical; }
    .modal-field .checkbox-row { display:flex; align-items:center; gap:8px; }
    .modal-field .checkbox-row input[type="checkbox"] { width:auto; height:16px; cursor:pointer; }
    .modal-footer { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
    .btn-modal-save {
      background:linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%);
      color:#fff; border:none; border-radius:4px;
      padding:8px 24px; font-size:0.85rem; font-weight:700; cursor:pointer;
      transition:opacity 0.2s;
    }
    .btn-modal-save:hover { opacity:0.88; }
    .btn-modal-cancel {
      background:#fff; color:var(--primary); border:1.5px solid var(--gray-border);
      border-radius:4px; padding:8px 18px; font-size:0.85rem; cursor:pointer;
      transition:border-color 0.2s;
    }
    .btn-modal-cancel:hover { border-color:var(--primary); }
    .modal-close-btn {
      position:absolute; top:14px; right:16px;
      background:none; border:none; font-size:1.3rem; color:var(--text-sub); cursor:pointer;
    }
    .modal-close-btn:hover { color:var(--primary); }

    /* ═══ トースト ══════════════════════════════════════════════ */
    .toast {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
      background:var(--primary); color:#fff; border-radius:6px;
      padding:10px 24px; font-size:0.85rem; font-weight:600;
      box-shadow:0 4px 16px rgba(0,0,0,0.2); z-index:900;
      opacity:0; transition:opacity 0.3s; pointer-events:none;
    }
    .toast.show { opacity:1; }

    .site-footer { background:var(--primary-dark); color:rgba(255,255,255,0.45); text-align:center; font-size:0.7rem; letter-spacing:0.06em; padding:14px 16px; margin-top:40px; }

    @media (max-width:768px) { .search-grid { flex-direction:column; } .field-group.text input, .field-group.sel select { width:100%; } }
  </style>
</head>
<body>

  <!-- ヘッダー -->
  <header class="site-header">
    <div class="header-logo">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M32 4L8 14v18c0 13.3 10.3 25.7 24 29 13.7-3.3 24-15.7 24-29V14L32 4z"
              fill="none" stroke="var(--accent)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M32 12L14 20v12c0 9 6.8 17.4 18 20.4C45.2 49.4 52 41 52 32V20L32 12z"
              fill="rgba(255,255,255,0.15)"/>
        <polyline points="22,32 29,39 43,25"
                  stroke="var(--accent-light)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="header-logo-text">
        <div class="company">AX損害保険株式会社</div>
      </div>
    </div>
    <span class="header-center-title">意向確認</span>
    <div class="header-right">
      <span class="page-badge"><i class="fa-solid fa-clipboard-list" style="margin-right:5px"></i>意向確認</span>
      <div class="user-badge"><span id="hdr-code"></span><span id="hdr-name">--</span></div>
      <a href="dashboard.html" class="btn-back">← ダッシュボード</a>
      <button class="btn-logout" id="btn-logout">ログアウト</button>
    </div>
  </header>
  <div class="accent-bar"></div>

  <div class="main-content">
    <div class="page-title"><i class="fa-solid fa-clipboard-list"></i>意向確認</div>

    <!-- 絞り込み検索パネル -->
    <div class="search-card">
      <div class="search-grid">
        <div class="field-group sel">
          <label>ステータス</label>
          <select id="search-status">
            <option value="">すべて</option>
            <option value="未記録">未記録</option>
            <option value="記録済">記録済</option>
            <option value="確認済">確認済</option>
          </select>
        </div>
        <div class="field-group sel">
          <label>保険種目</label>
          <select id="search-policy-type">
            <option value="">すべて</option>
            <option value="AUTO">自動車</option>
            <option value="FIRE">火災</option>
            <option value="INJURY">傷害</option>
            <option value="JIBAI">自賠責</option>
            <option value="LIABILITY">賠償責任</option>
            <option value="CYBER">サイバーリスク</option>
            <option value="INCOME">所得補償</option>
          </select>
        </div>
        <div class="field-group text">
          <label>担当者コード</label>
          <input type="text" id="search-staff" placeholder="担当者コード">
        </div>
        <div class="btn-group">
          <button class="btn-search" onclick="loadIntentions(1)">
            <i class="fa-solid fa-magnifying-glass" style="margin-right:5px"></i>検索
          </button>
          <button class="btn-clear" onclick="clearSearch()">リセット</button>
        </div>
      </div>
    </div>

    <!-- 集計バッジ -->
    <div class="count-bar" id="count-bar">
      <span class="count-badge total">全件: <span id="cnt-total">--</span>件</span>
      <span class="count-badge unrecorded">▲未記録: <span id="cnt-unrecorded">--</span>件</span>
      <span class="count-badge recorded">記録済: <span id="cnt-recorded">--</span>件</span>
      <span class="count-badge confirmed">確認済: <span id="cnt-confirmed">--</span>件</span>
    </div>

    <!-- 一覧テーブル -->
    <div class="table-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:130px">証券番号</th>
              <th style="width:120px">顧客名</th>
              <th style="width:100px">保険種目</th>
              <th style="width:100px">担当者</th>
              <th style="width:90px">ステータス</th>
              <th style="width:130px">更新日時</th>
              <th style="width:80px">操作</th>
            </tr>
          </thead>
          <tbody id="intention-tbody">
            <tr><td colspan="7" class="empty-msg">読み込み中...</td></tr>
          </tbody>
        </table>
      </div>
      <!-- ページネーション -->
      <div class="pagination">
        <button class="btn-page" id="btn-prev" onclick="prevPage()" disabled>← 前へ</button>
        <span class="page-info" id="page-info">--</span>
        <button class="btn-page" id="btn-next" onclick="nextPage()" disabled>次へ →</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">&copy; 2026 AX損害保険株式会社. All Rights Reserved.</footer>

  <!-- 意向確認記録モーダル -->
  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <button class="modal-close-btn" onclick="closeModal()">×</button>
      <div class="modal-title"><i class="fa-solid fa-pen-to-square"></i>意向確認記録</div>
      <input type="hidden" id="modal-id">
      <div class="modal-field">
        <label>証券番号</label>
        <input type="text" id="modal-policy-no" readonly>
      </div>
      <div class="modal-field">
        <label>顧客名</label>
        <input type="text" id="modal-customer-name" readonly>
      </div>
      <div class="modal-field">
        <label>保険種目</label>
        <input type="text" id="modal-policy-type" readonly>
      </div>
      <div class="modal-field">
        <label>顧客ニーズ・リスク認識</label>
        <textarea id="modal-needs" rows="3" placeholder="顧客のニーズやリスク認識を記録してください"></textarea>
      </div>
      <div class="modal-field">
        <label>提案した商品</label>
        <textarea id="modal-proposed" rows="2" placeholder="提案した商品を記録してください"></textarea>
      </div>
      <div class="modal-field">
        <label>比較した商品</label>
        <textarea id="modal-compared" rows="2" placeholder="比較検討した商品を記録してください"></textarea>
      </div>
      <div class="modal-field">
        <label>推奨理由</label>
        <textarea id="modal-reason" rows="3" placeholder="推奨理由を記録してください"></textarea>
      </div>
      <div class="modal-field">
        <label>最終選択商品</label>
        <input type="text" id="modal-final-product" placeholder="顧客が最終的に選択した商品">
      </div>
      <div class="modal-field">
        <label>顧客確認済</label>
        <div class="checkbox-row">
          <input type="checkbox" id="modal-confirmed" onchange="onConfirmCheck()">
          <span style="font-size:0.82rem">顧客が意向を確認済み</span>
        </div>
        <input type="hidden" id="modal-confirmed-at">
      </div>
      <div class="modal-field">
        <label>ステータス</label>
        <select id="modal-status">
          <option value="未記録">未記録</option>
          <option value="記録済">記録済</option>
          <option value="確認済">確認済</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn-modal-cancel" onclick="closeModal()">キャンセル</button>
        <button class="btn-modal-save" onclick="saveIntention()">
          <i class="fa-solid fa-floppy-disk" style="margin-right:5px"></i>保存
        </button>
      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    let _currentPage = 1;
    const _limit = 20;

    // 保険種目ラベルマップ
    const POLICY_TYPE_LABEL = {
      AUTO:      '自動車',
      FIRE:      '火災',
      INJURY:    '傷害',
      JIBAI:     '自賠責',
      LIABILITY: '賠償責任',
      CYBER:     'サイバーリスク',
      INCOME:    '所得補償',
    };

    // 意向確認一覧を取得して描画（20件/ページ）
    async function loadIntentions(page = 1) {
      _currentPage = page;
      const agencyCode  = sessionStorage.getItem('agency_code') || '';
      const status      = document.getElementById('search-status').value;
      const policyType  = document.getElementById('search-policy-type').value;
      const staffCode   = document.getElementById('search-staff').value.trim();

      const qs = new URLSearchParams({ page, limit: _limit });
      if (status)     qs.set('status',      status);
      if (policyType) qs.set('policy_type', policyType);
      if (staffCode)  qs.set('staff_code',  staffCode);

      const tbody = document.getElementById('intention-tbody');
      tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">読み込み中...</td></tr>';

      try {
        const res = await fetch(`${API_BASE}/api/intentions/${agencyCode}?${qs}`, {
          headers: { 'Authorization': `Bearer ${sessionStorage.getItem('token')}` }
        });
        if (res.status === 401) { doLogout(); return; }
        if (!res.ok) throw new Error('API error');
        const data = await res.json();
        renderTable(data);
        renderBadges(data);
        renderPagination(data.total || 0, page);
      } catch (e) {
        console.error('意向確認一覧取得失敗:', e);
        tbody.innerHTML = '<tr><td colspan="7" class="empty-msg" style="color:#ef4444">読み込みに失敗しました</td></tr>';
      }
    }

    // テーブルを描画
    function renderTable(data) {
      const tbody = document.getElementById('intention-tbody');
      const items = data.items || [];
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">該当する意向確認記録はありません</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(item => {
        const statusBadge = item.status === '未記録'
          ? `<span class="badge badge-unrecorded">未記録</span>`
          : item.status === '記録済'
          ? `<span class="badge badge-recorded">記録済</span>`
          : `<span class="badge badge-confirmed">確認済</span>`;

        const actionBtn = item.status === '未記録'
          ? `<button class="btn-record" onclick="openModal(${JSON.stringify(item).replace(/"/g,'&quot;')})">記録</button>`
          : `<button class="btn-edit"   onclick="openModal(${JSON.stringify(item).replace(/"/g,'&quot;')})">編集</button>`;

        const policyTypeLabel = POLICY_TYPE_LABEL[item.policy_type] || item.policy_type || '—';
        const updAt = item.updated_at ? item.updated_at.replace('T', ' ').slice(0, 16) : '—';

        return `<tr>
          <td class="td-left">${escHtml(item.policy_no || '—')}</td>
          <td class="td-left">${escHtml(item.customer_name || '—')}</td>
          <td>${escHtml(policyTypeLabel)}</td>
          <td>${escHtml(item.staff_code || '—')}</td>
          <td>${statusBadge}</td>
          <td>${escHtml(updAt)}</td>
          <td>${actionBtn}</td>
        </tr>`;
      }).join('');
    }

    // 集計バッジを描画
    function renderBadges(data) {
      document.getElementById('cnt-total').textContent      = (data.total        || 0).toLocaleString();
      document.getElementById('cnt-unrecorded').textContent = (data.unrecorded   || 0).toLocaleString();
      document.getElementById('cnt-recorded').textContent   = (data.recorded     || 0).toLocaleString();
      document.getElementById('cnt-confirmed').textContent  = (data.confirmed    || 0).toLocaleString();
    }

    // ページネーションを描画
    function renderPagination(total, page) {
      const totalPages = Math.max(1, Math.ceil(total / _limit));
      document.getElementById('page-info').textContent = `${page} / ${totalPages} ページ（全 ${total} 件）`;
      document.getElementById('btn-prev').disabled = page <= 1;
      document.getElementById('btn-next').disabled = page >= totalPages;
    }

    // 前ページへ
    function prevPage() {
      if (_currentPage > 1) loadIntentions(_currentPage - 1);
    }

    // 次ページへ
    function nextPage() {
      loadIntentions(_currentPage + 1);
    }

    // 検索リセット
    function clearSearch() {
      document.getElementById('search-status').value      = '';
      document.getElementById('search-policy-type').value = '';
      document.getElementById('search-staff').value       = '';
      loadIntentions(1);
    }

    // モーダルを開く
    function openModal(item) {
      document.getElementById('modal-id').value             = item.id || '';
      document.getElementById('modal-policy-no').value      = item.policy_no || '';
      document.getElementById('modal-customer-name').value  = item.customer_name || '';
      document.getElementById('modal-policy-type').value    = POLICY_TYPE_LABEL[item.policy_type] || item.policy_type || '';
      document.getElementById('modal-needs').value          = item.customer_needs || '';
      document.getElementById('modal-proposed').value       = item.proposed_product || '';
      document.getElementById('modal-compared').value       = item.compared_product || '';
      document.getElementById('modal-reason').value         = item.recommendation_reason || '';
      document.getElementById('modal-final-product').value  = item.final_product || '';
      document.getElementById('modal-confirmed').checked    = !!item.confirmed_at;
      document.getElementById('modal-confirmed-at').value   = item.confirmed_at || '';
      document.getElementById('modal-status').value         = item.status || '未記録';
      document.getElementById('modal-backdrop').classList.add('open');
    }

    // モーダルを閉じる
    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
    }

    // 顧客確認チェックボックス変更時の処理
    function onConfirmCheck() {
      const checked = document.getElementById('modal-confirmed').checked;
      if (checked) {
        // 現在日時を確認日時としてセット（ISO 8601形式）
        document.getElementById('modal-confirmed-at').value = new Date().toISOString();
      } else {
        document.getElementById('modal-confirmed-at').value = '';
      }
    }

    // 意向確認を保存（POST/PUT）
    async function saveIntention(body) {
      const id = document.getElementById('modal-id').value;
      const payload = {
        id:                    id || null,
        policy_no:             document.getElementById('modal-policy-no').value,
        customer_needs:        document.getElementById('modal-needs').value,
        proposed_product:      document.getElementById('modal-proposed').value,
        compared_product:      document.getElementById('modal-compared').value,
        recommendation_reason: document.getElementById('modal-reason').value,
        final_product:         document.getElementById('modal-final-product').value,
        confirmed_at:          document.getElementById('modal-confirmed-at').value || null,
        status:                document.getElementById('modal-status').value,
      };
      const url    = id ? `${API_BASE}/api/intentions/${id}` : `${API_BASE}/api/intentions`;
      const method = id ? 'PUT' : 'POST';
      try {
        const res = await fetch(url, {
          method,
          headers: {
            'Authorization': `Bearer ${sessionStorage.getItem('token')}`,
            'Content-Type':  'application/json'
          },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          closeModal();
          showToast('意向確認を保存しました');
          loadIntentions(_currentPage);
        } else {
          const err = await res.json().catch(() => ({}));
          alert('保存に失敗しました: ' + (err.detail || res.status));
        }
      } catch (e) {
        console.error('意向確認保存失敗:', e);
        alert('通信エラーが発生しました');
      }
    }

    // トースト表示
    function showToast(msg, isError = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.background = isError ? '#dc2626' : 'var(--primary)';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2800);
    }

    // HTMLエスケープ
    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── 初期化 ──────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      // 認証チェック
      const token = requireAuth();
      if (!token) return;

      // ヘッダーにユーザー情報を表示
      const userType = sessionStorage.getItem('user_type') || 'agency';
      if (userType === 'staff') {
        document.getElementById('hdr-code').textContent = (sessionStorage.getItem('staff_code') || '') + ' ';
        document.getElementById('hdr-name').textContent = sessionStorage.getItem('staff_name') || '';
      } else {
        document.getElementById('hdr-code').textContent = (sessionStorage.getItem('agency_code') || '') + ' ';
        document.getElementById('hdr-name').textContent = sessionStorage.getItem('login_id') || '';
      }

      document.getElementById('btn-logout').addEventListener('click', doLogout);

      // モーダル外クリックで閉じる
      document.getElementById('modal-backdrop').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal();
      });

      await loadIntentions(1);
    });
  </script>

</body>
</html>
